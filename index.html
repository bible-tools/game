<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
    <title>Bible Tools - Game</title>
    <style>
      :root {
        --absent: #939194;
        --accent-hover: #45a049;
        --accent: #4caf50;
        --bg-primary: #f0f0f0;
        --bg-secondary: #ffffff;
        --border: #cccccc;
        --correct: #66bb6a;
        --error: #d32f2f;
        --input-bg: #ffffff;
        --present: #f3b72e;
        --success: #2e7d32;
        --text-primary: #333333;
        --text-secondary: #555555;

        --link-color: #1a6b1a;
        --link-hover: #0d3d0d;
      }

      [data-theme="dark"] {
        --absent: #48494b;
        --accent-hover: #66bb6a;
        --accent: #4caf50;
        --bg-primary: #1a1a2e;
        --bg-secondary: #16213e;
        --border: #444444;
        --correct: #66bb6a;
        --error: #ef5350;
        --input-bg: #0f3460;
        --present: #f3b72e;
        --success: #66bb6a;
        --text-primary: #eaeaea;
        --text-secondary: #b0b0b0;

        --link-color: #81c784;
        --link-hover: #a5d6a7;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        padding: 0.875rem;
        transition:
          background 0.3s,
          color 0.3s;
      }

      .page {
        margin: 0 auto;
        max-width: 45rem;
      }

      .page__header {
        align-items: flex-start;
        display: flex;
        flex-direction: column;
        gap: 0.625rem;
        margin-bottom: 1.25rem;
      }

      .page__title {
        color: var(--text-primary);
        font-size: 1.3rem;
      }

      .page__title-link--icon {
        text-decoration: none;
      }

      .page__controls {
        align-items: center;
        display: flex;
        width: 100%;
        flex-wrap: wrap;
        gap: 0.625rem;
      }

      .page__translation-select,
      .page__theme-toggle {
        background: var(--input-bg);
        border: 0.0625rem solid var(--border);
        border-radius: 0.375rem;
        color: var(--text-primary);
        font-size: 0.95rem;
        padding: 0.5rem 0.75rem;
        transition: all 0.2s;
      }

      .page__theme-toggle {
        background: var(--accent);
        border: none;
        color: white;
        cursor: pointer;
        font-weight: 500;
      }

      .page__theme-toggle:hover {
        background: var(--accent-hover);
      }

      .page__theme-toggle:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .page__translation-select:focus-visible,
      .page__theme-toggle:focus-visible {
        outline: 0.125rem solid var(--accent);
        outline-offset: 0.125rem;
      }

      .page__translation-label {
        font-size: 0.9rem;
      }

      .page__link {
        color: var(--link-color);
        text-decoration: underline;
        text-underline-offset: 0.125rem;
      }

      .page__link:hover {
        color: var(--link-hover);
      }

      .page__link:focus-visible {
        border-radius: 0.125rem;
        outline: 0.125rem solid var(--link-color);
        outline-offset: 0.1875rem;
        text-decoration: none;
      }

      .page__footer {
        color: var(--text-secondary);
        font-size: 0.85rem;
        padding: 0.9375rem;
        text-align: center;
      }

      @media (min-width: 45rem) {
        body {
          padding: 1.25rem;
        }

        .page__header {
          align-items: center;
          flex-direction: row;
          justify-content: space-between;
        }

        .page__title {
          font-size: 1.6rem;
        }

        .page__controls {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="page__header">
        <h1 class="page__title">
          <a
            class="page__link page__title-link page__title-link--icon"
            href="https://bible-tools.github.io/app/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Bible Tools - App (opens in new tab)"
            >📖</a
          >
          <a
            class="page__link page__title-link"
            id="titleReloadLink"
            href="https://bible-tools.github.io/game/"
            aria-label="Bible Tools - Game home"
            >Bible Tools - Game</a
          >
        </h1>
        <div class="page__controls">
          <label class="page__translation-label" for="translation"
            >Translation:</label
          >
          <select
            class="page__translation-select"
            id="translation"
            aria-label="Select translation"
          ></select>
          <button
            class="page__theme-toggle"
            id="themeToggle"
            aria-label="Toggle dark theme"
            aria-pressed="false"
          >
            🌙 Dark
          </button>
        </div>
      </header>

      <bible-tools-game id="game"></bible-tools-game>

      <footer class="page__footer">
        <p>
          Data from
          <a
            class="page__link"
            href="https://github.com/bible-tools/data"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="https://github.com/bible-tools/data (opens in new tab)"
            >https://github.com/bible-tools/data</a
          >
          •
          <a class="page__link" href="https://bible-tools.github.io/app/"
            >Bible Tools</a
          >
        </p>
      </footer>
    </div>

    <script type="module">
      const API_ROOT = "https://bible-tools.github.io/data/translations";
      const PUZZLE_MODE_DAILY = "daily";
      const PUZZLE_MODE_RANDOM = "random";
      const UINT32_MASK = 0xffffffff;

      function hashStringToUint32(value) {
        let hash = 0;

        for (let i = 0; i < value.length; i++) {
          hash = (hash << 5) - hash + value.charCodeAt(i);
          hash |= 0;
        }

        return hash >>> 0;
      }

      function getLocalDateKey(date = new Date()) {
        const year = String(date.getFullYear());
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");

        return `${year}-${month}-${day}`;
      }

      function makeDailyPuzzleId(dateKey) {
        return `daily:${dateKey}`;
      }

      function makeRandomPuzzleId(previousId = "") {
        const words = new Uint32Array(3);

        if (globalThis.crypto?.getRandomValues) {
          globalThis.crypto.getRandomValues(words);
        } else {
          words[0] = Math.floor(Math.random() * UINT32_MASK);
          words[1] = Math.floor(Math.random() * UINT32_MASK);
          words[2] = Date.now() & UINT32_MASK;
        }

        const now = Date.now().toString(36);
        const entropy = Array.from(words, (word) => word.toString(36)).join("-");
        let id = `random:${now}:${entropy}`;

        if (id === previousId) {
          id = `${id}:${Math.floor(Math.random() * 1_000_000).toString(36)}`;
        }

        return id;
      }

      function derivePuzzleSelection(reference, puzzleId, books) {
        const canonicalBooks = Array.isArray(books) && books.length > 0
          ? books
          : Object.keys(reference?.books || {});

        if (canonicalBooks.length === 0) {
          throw new Error("Reference data does not contain any books");
        }

        const bookSeed = hashStringToUint32(`${puzzleId}|book`);
        const book = canonicalBooks[bookSeed % canonicalBooks.length];
        const chapterKeys = Object.keys(reference.books?.[book]?.chapters || {});

        if (chapterKeys.length === 0) {
          throw new Error(`Book has no chapters: ${book}`);
        }

        const chapterSeed = hashStringToUint32(`${puzzleId}|${book}|chapter`);
        const chapterKey = chapterKeys[chapterSeed % chapterKeys.length];
        const chapterData = reference.books[book].chapters[chapterKey];
        const verseCount = Number(chapterData.verses) || 0;

        if (verseCount <= 0) {
          throw new Error(`Chapter has no verses: ${book} ${chapterKey}`);
        }

        const verseSeed = hashStringToUint32(`${puzzleId}|${book}|${chapterKey}|verse`);
        const verseNum = (verseSeed % verseCount) + 1;

        return {
          book,
          chapter: Number.parseInt(chapterKey, 10),
          chapterKey,
          verseNum,
        };
      }

      // Definitive translation options from https://bible-tools.github.io/app/dist/esm/BibleToolsPreferences.js.

          "Obadja", "Jona", "Micha", "Nahum", "Habakuk",
          "Zephanja", "Haggai", "Sacharja", "Maleachi", "Matthäus",
          "Markus", "Lukas", "Johannes", "Apostelgeschichte", "Römer",
          "1. Korinther", "2. Korinther", "Galater", "Epheser", "Philipper",
          "Kolosser", "1. Thessalonicher", "2. Thessalonicher", "1. Timotheus", "2. Timotheus",

          "نحميا", "استير", "أيوب", "المزامير", "الأمثال",
          "الجامعة", "نشيد الأنشاد", "إشعياء", "إرميا", "المراثي",
          "حزقيال", "دانيال", "هوشع", "يوئيل", "عاموس",

      function getCanonicalBookNameByIndex(bookIndex, languageCode) {
        const books = CANONICAL_BOOK_NAMES[languageCode] || CANONICAL_BOOK_NAMES.en;
        return books[bookIndex - 1] || null; // bookIndex is 1-based
      }

      const COMMUNITY_DEFAULT_CANONICAL_BOOKS_SET = new Set(
        COMMUNITY_DEFAULT_CANONICAL_BOOKS,
      );

      function getSelectedTranslation(version) {
        return (
          translationByVersion[version] ||
          translationByVersion[preferences.defaultVersion]
        );
      }

      function getTranslationBaseUrl(version) {
        const selected = getSelectedTranslation(version);

        return `${API_ROOT}/${selected.language}/${selected.version}`;
      }

      function resolveTranslationVersion(rawVersion) {
        if (!rawVersion) {
          return preferences.defaultVersion;
        }

        if (translationByVersion[rawVersion]) {
          return rawVersion;
        }

        const normalizedVersion = rawVersion.toLowerCase();
        const matchedTranslation = preferences.translations.find(
          (translation) => translation.version.toLowerCase() === normalizedVersion,
        );

        return matchedTranslation?.version || preferences.defaultVersion;
      }

      function resolveInitialTranslationVersion() {
        const rawParam = new URLSearchParams(window.location.search).get("translation");

        return resolveTranslationVersion(rawParam);
      }

      function populateTranslationSelect(selectedVersion) {
        const select = document.getElementById("translation");
        if (!select) return;

        select.innerHTML = preferences.translations
          .map(
            (translation) =>
              `<option value="${translation.version}">${translation.languageLabel} - ${translation.label}</option>`,
          )
          .join("");

        select.value = getSelectedTranslation(selectedVersion).version;
      }

      // Letter evaluation
      function evaluateGuess(guess, target) {
        const result = [];
        const targetChars = target.toLowerCase().split("");
        const guessChars = guess.toLowerCase().split("");

        // First pass: mark correct positions
        for (let i = 0; i < guessChars.length; i++) {
          if (guessChars[i] === targetChars[i]) {
            result[i] = "correct";

            targetChars[i] = null;
          } else {
            result[i] = "absent";
          }
        }

        // Second pass: mark present letters
        for (let i = 0; i < guessChars.length; i++) {
          if (result[i] !== "correct") {
            const idx = targetChars.indexOf(guessChars[i]);
            if (idx !== -1) {
              result[i] = "present";

              targetChars[idx] = null;
            }
          }
        }

        return result;
      }

      class BibleToolsGame extends HTMLElement {
        constructor() {
          super();

          this.attachShadow({ mode: "open" });

          const initialTranslation = resolveInitialTranslationVersion();

          this.state = {
            translation: initialTranslation,
            referenceCache: null,
            canonicalBooks: [],
            filteredCanonicalBooks: [],
            localizedBookNames: [],
            bookNameMap: {},
            localizedBookNamesCache: {},
            puzzleMode: PUZZLE_MODE_DAILY,
            puzzleId: null,
            puzzleHistory: [],
            puzzleHistoryIndex: -1,
            dailyDateKey: getLocalDateKey(),
            currentBook: null,
            currentBookDisplay: null,
            currentChapter: null,
            currentVerseNum: null,
            verseText: null,
            guesses: [],
            attempts: 0,
            solved: false,
            gameOver: false,
            loading: true,
            error: null,
            animateLastRow: false,
            suggestionList: [],
            activeSuggestion: -1,
            pendingGuessInput: "",
            today: new Date(),
          };

          this.midnightTimerId = null;
          this.onPopState = () => {
            this.applyUrlState({ addHistoryEntry: false });
            this.resetPlayState();
            this.state.referenceCache = null;
            this.state.canonicalBooks = [];
            this.state.filteredCanonicalBooks = [];
            this.state.localizedBookNames = [];
            this.state.bookNameMap = {};
            this.loadGame();
          };
          this.onVisibilityOrFocus = () => this.refreshDailyPuzzleIfNeeded();
        }

        connectedCallback() {
          this.render();
          this.setupEvents();
          this.applyUrlState({ addHistoryEntry: true });
          this.setupGlobalEvents();
          this.scheduleDailyRolloverCheck();
          this.loadGame();
        }

        disconnectedCallback() {
          if (this.midnightTimerId) {
            clearTimeout(this.midnightTimerId);
            this.midnightTimerId = null;
          }

          window.removeEventListener("popstate", this.onPopState);
          window.removeEventListener("focus", this.onVisibilityOrFocus);
          document.removeEventListener(
            "visibilitychange",
            this.onVisibilityOrFocus,
          );
        }

        render() {
          this.shadowRoot.innerHTML = `
          <style>
            :host {
              display: block;
            }

            .game {
              margin: 0 auto;
              max-width: 45rem;
              padding: 0;
            }

            @keyframes flipIn {
              0% {
                opacity: 0;
                transform: rotateX(-90deg);
              }

              50% {
                opacity: 1;
                transform: rotateX(0);
              }

              100% {
                opacity: 1;
                transform: rotateX(0);
              }
            }

            .game__state-message {
              color: var(--text-secondary);
              padding: 1.875rem;
              text-align: center;
            }

            .game__state-message--error {
              color: var(--error);
              padding: 1.25rem;
              text-align: center;
            }

            .game__verse-card {
              background: var(--bg-secondary);
              border-left: 0.25rem solid var(--accent);
              border-radius: 0.75rem;
              box-shadow: 0 0.125rem 0.625rem rgba(0, 0, 0, 0.1);
              font-size: 1.05rem;
              line-height: 1.6;
              margin: 1.25rem 0;
              padding: 1.25rem;
            }

            .game__verse-text {
              color: var(--text-primary);
              font-style: italic;
              margin-bottom: 0.9375rem;
            }

            .game__verse-ref {
              color: var(--text-secondary);
              font-size: 0.9rem;
              font-weight: 500;
            }

            .game__section {
              background: var(--bg-secondary);
              border-radius: 0.75rem;
              box-shadow: 0 0.125rem 0.625rem rgba(0, 0, 0, 0.1);
              margin: 1.25rem 0;
              padding: 1.25rem;
            }

            .game__prompt {
              color: var(--text-primary);

              list-style: none;
              max-height: 12rem;
              overflow-y: auto;
              position: absolute;
              right: 0;
              top: 100%;
              z-index: 10;

              display: none;

              color: var(--text-primary);
              cursor: pointer;
              font-size: 0.95rem;
              padding: 0.5rem 0.75rem;

            .game__suggestion-item--active {
              background: var(--accent);
              color: white;
            }

              .game__verse-text {
                font-size: 1.05rem;
              }

              .game__input-group {
                flex-direction: row;
              }

              .game__input,
              .game__button {
                width: auto;
              }
            }
          </style>
          <div class="game">
            <div id="mainContent">
              <div class="game__state-message">Loading today's verse...</div>
            </div>
          </div>
        `;
        }

        setupEvents() {
          document
            .getElementById("translation")
            ?.addEventListener("change", (e) =>
              this.handleTranslationChange(e.target.value),
            );
        }

        setupGlobalEvents() {
          window.addEventListener("popstate", this.onPopState);
          window.addEventListener("focus", this.onVisibilityOrFocus);
          document.addEventListener("visibilitychange", this.onVisibilityOrFocus);
        }

        applyUrlState({ addHistoryEntry }) {
          const params = new URLSearchParams(window.location.search);
          const requestedTranslation = params.get("translation");

          this.state.translation = resolveTranslationVersion(requestedTranslation);

          const translationSelect = document.getElementById("translation");
          if (translationSelect) {
            translationSelect.value = this.state.translation;
          }

          const requestedMode = params.get("mode");
          const puzzleMode =
            requestedMode === PUZZLE_MODE_RANDOM
              ? PUZZLE_MODE_RANDOM
              : PUZZLE_MODE_DAILY;
          const requestedPuzzleId = params.get("puzzle");
          const legacyHashParam = params.get("hash");
          const legacyHash = Number.parseInt(legacyHashParam ?? "", 10);
          const localDateKey = getLocalDateKey();

          this.state.dailyDateKey = localDateKey;

          let nextMode = puzzleMode;
          let nextPuzzleId = requestedPuzzleId;

          if (!nextPuzzleId) {
            if (Number.isFinite(legacyHash)) {
              nextMode = PUZZLE_MODE_RANDOM;
              nextPuzzleId = `legacy:${Math.abs(legacyHash)}`;
            } else {
              nextMode = PUZZLE_MODE_DAILY;
              nextPuzzleId = makeDailyPuzzleId(localDateKey);
            }
          }

          this.setPuzzle(nextPuzzleId, nextMode, {
            addHistoryEntry,
            pushUrl: false,
            replaceCurrentHistoryEntry: !addHistoryEntry,
          });
          this.updateUrlState({ push: false });
        }

        updateUrlState({ push }) {
          const params = new URLSearchParams(window.location.search);
          params.set("mode", this.state.puzzleMode);
          params.set("puzzle", this.state.puzzleId);
          params.set("translation", this.state.translation);

          const nextQuery = params.toString();
          const nextUrl = `${window.location.pathname}?${nextQuery}${window.location.hash}`;

          if (push) {
            window.history.pushState(null, "", nextUrl);
          } else {
            window.history.replaceState(null, "", nextUrl);
          }
        }

        setPuzzle(
          puzzleId,
          puzzleMode,
          { addHistoryEntry, pushUrl, replaceCurrentHistoryEntry = false },
        ) {
          this.state.puzzleId = puzzleId;
          this.state.puzzleMode = puzzleMode;

          if (addHistoryEntry) {
            this.pushPuzzleHistoryEntry(
              {
                translation: this.state.translation,
                puzzleMode: this.state.puzzleMode,
                puzzleId: this.state.puzzleId,
              },
              replaceCurrentHistoryEntry,
            );
          }

          if (typeof pushUrl === "boolean") {
            this.updateUrlState({ push: pushUrl });
          }
        }

        pushPuzzleHistoryEntry(entry, replaceCurrentHistoryEntry = false) {
          if (
            replaceCurrentHistoryEntry &&
            this.state.puzzleHistoryIndex >= 0 &&
            this.state.puzzleHistoryIndex < this.state.puzzleHistory.length
          ) {
            this.state.puzzleHistory[this.state.puzzleHistoryIndex] = entry;

            return;
          }

          const nextIndex = this.state.puzzleHistoryIndex + 1;

          this.state.puzzleHistory = this.state.puzzleHistory.slice(0, nextIndex);
          this.state.puzzleHistory.push(entry);
          this.state.puzzleHistoryIndex = this.state.puzzleHistory.length - 1;
        }

        resetPlayState() {
          this.state.guesses = [];
          this.state.attempts = 0;
          this.state.solved = false;
          this.state.gameOver = false;
          this.state.suggestionList = [];
          this.state.activeSuggestion = -1;
          this.state.animateLastRow = false;
        }

        handleTranslationChange(nextTranslation) {
          if (!translationByVersion[nextTranslation]) return;

          const input = this.shadowRoot?.getElementById("guessInput");

          this.state.pendingGuessInput = input?.value?.trim() || "";
          this.state.translation = nextTranslation;
          this.state.referenceCache = null;
          this.state.canonicalBooks = [];
          this.state.filteredCanonicalBooks = [];
          this.state.localizedBookNames = [];
          this.state.bookNameMap = {};
          this.resetPlayState();

          if (this.state.puzzleMode === PUZZLE_MODE_DAILY) {
            this.state.dailyDateKey = getLocalDateKey();
            this.setPuzzle(
              makeDailyPuzzleId(this.state.dailyDateKey),
              PUZZLE_MODE_DAILY,
              { addHistoryEntry: true, pushUrl: true },
            );
          } else {
            this.setPuzzle(
              this.state.puzzleId || makeRandomPuzzleId(),
              PUZZLE_MODE_RANDOM,
              {
                addHistoryEntry: true,
                pushUrl: true,
              },
            );
          }

          this.loadGame();
        }

        resetCurrentGame() {
          this.startDailyGame();
        }

        startDailyGame() {
          this.state.dailyDateKey = getLocalDateKey();
          this.state.pendingGuessInput = "";
          this.resetPlayState();
          this.setPuzzle(
            makeDailyPuzzleId(this.state.dailyDateKey),
            PUZZLE_MODE_DAILY,
            { addHistoryEntry: true, pushUrl: true },
          );
          this.loadGame();
        }

        startRandomGame() {
          this.state.pendingGuessInput = "";
          this.resetPlayState();

          let nextPuzzleId = makeRandomPuzzleId(this.state.puzzleId || "");

          for (let i = 0; i < 5 && nextPuzzleId === this.state.puzzleId; i++) {
            nextPuzzleId = makeRandomPuzzleId(this.state.puzzleId || "");
          }

          this.setPuzzle(nextPuzzleId, PUZZLE_MODE_RANDOM, {
            addHistoryEntry: true,
            pushUrl: true,
          });

          this.loadGame();
        }

        goToPuzzleHistory(direction) {
          const nextIndex = this.state.puzzleHistoryIndex + direction;

          if (nextIndex < 0 || nextIndex >= this.state.puzzleHistory.length) {
            return;
          }

          const entry = this.state.puzzleHistory[nextIndex];
          const translationChanged = entry.translation !== this.state.translation;

          this.state.puzzleHistoryIndex = nextIndex;
          this.state.puzzleId = entry.puzzleId;
          this.state.puzzleMode = entry.puzzleMode;
          this.state.translation = entry.translation;

          if (translationChanged) {
            this.state.referenceCache = null;
            this.state.canonicalBooks = [];
            this.state.filteredCanonicalBooks = [];
            this.state.localizedBookNames = [];
            this.state.bookNameMap = {};

            const translationSelect = document.getElementById("translation");
            if (translationSelect) {
              translationSelect.value = this.state.translation;
            }
          }

          this.state.pendingGuessInput = "";
          this.resetPlayState();
          this.updateUrlState({ push: false });
          this.loadGame();
        }

        refreshDailyPuzzleIfNeeded() {
          if (this.state.puzzleMode !== PUZZLE_MODE_DAILY) {
            return;
          }

          const localDateKey = getLocalDateKey();

          if (localDateKey === this.state.dailyDateKey) {
            return;
          }

          this.state.dailyDateKey = localDateKey;
          this.state.pendingGuessInput = "";
          this.resetPlayState();

          this.setPuzzle(
            makeDailyPuzzleId(localDateKey),
            PUZZLE_MODE_DAILY,
            { addHistoryEntry: true, pushUrl: true },
          );

          this.loadGame();
        }

        scheduleDailyRolloverCheck() {
          if (this.midnightTimerId) {
            clearTimeout(this.midnightTimerId);
          }

          const now = new Date();
          const nextMidnight = new Date(now);
          nextMidnight.setHours(24, 0, 0, 50);

          this.midnightTimerId = setTimeout(() => {
            this.refreshDailyPuzzleIfNeeded();
            this.scheduleDailyRolloverCheck();
          }, nextMidnight.getTime() - now.getTime());
        }

        async loadGame() {
          if (!this.state.puzzleId) {
            this.state.dailyDateKey = getLocalDateKey();
            this.setPuzzle(
              makeDailyPuzzleId(this.state.dailyDateKey),
              PUZZLE_MODE_DAILY,
              { addHistoryEntry: true, pushUrl: false },
            );
          }

          this.state.loading = true;
          this.state.error = null;
          this.updateUI();

          try {
            // Load reference data
            const reference = await this.getReference();

            // Build list of canonical books
            if (this.state.canonicalBooks.length === 0) {
              this.state.canonicalBooks = Object.keys(reference.books);
            }

            this.state.bookNameMap = await this.getBookNameMap(reference);
            this.state.filteredCanonicalBooks = this.getDefaultFilteredBooks(
              this.state.canonicalBooks,
            );

            if (this.state.filteredCanonicalBooks.length === 0) {
              throw new Error("No books available after applying default filter");
            }

            this.state.localizedBookNames = this.state.filteredCanonicalBooks.map(
              (book) => this.state.bookNameMap[book] || book,
            );

            const selection = derivePuzzleSelection(
              reference,
              this.state.puzzleId,
              this.state.filteredCanonicalBooks,
            );

            // Fetch the verse
            const verseData = await this.fetchVerse(
              selection.book,
              selection.chapterKey,
              selection.verseNum,
            );

            this.state.currentBook = selection.book;
            this.state.currentBookDisplay =
              this.state.bookNameMap[selection.book] || selection.book;
            this.state.currentChapter = selection.chapter;
            this.state.currentVerseNum = selection.verseNum;
            this.state.verseText = verseData.text;
            this.state.loading = false;

            this.updateUI();
          } catch (err) {
            console.error("Error loading game:", err);

            this.state.error = "Failed to load today's verse. Try again later.";
            this.state.loading = false;

            this.updateUI();
          }
        }

        async getReference() {
          if (!this.state.referenceCache) {
            const baseUrl = getTranslationBaseUrl(this.state.translation);
            const res = await fetch(`${baseUrl}/reference.json`);

            if (!res.ok) throw new Error("Failed to fetch reference");

            this.state.referenceCache = await res.json();
          }

          return this.state.referenceCache;
        }

        async fetchVerse(book, chapter, verse) {
          const baseUrl = getTranslationBaseUrl(this.state.translation);
          const bookUrl = encodeURIComponent(book);
          const url = `${baseUrl}/${bookUrl}/${chapter}/${verse}/index.json`;
          const res = await fetch(url);

          if (!res.ok) throw new Error(`Verse not found: ${url}`);

          return res.json();
        }

        async getBookNameMap(reference) {
          const cached = this.state.localizedBookNamesCache[this.state.translation];
          if (cached) {
            return cached;
          }

          const languageCode = this.getCurrentLanguageCode();
          const canonicalBooks = Object.keys(reference.books);

          // First, build from static canonical book names
          const staticMap = {};
          let builtFromStatic = true;

          for (let i = 0; i < canonicalBooks.length; i++) {
            const book = canonicalBooks[i];
            const localized = getCanonicalBookNameByIndex(i + 1, languageCode);

            if (localized) {
              staticMap[book] = localized;
            } else {
              builtFromStatic = false;
              break;
            }
          }

          // If static map was complete, cache and return it
          if (builtFromStatic && Object.keys(staticMap).length === canonicalBooks.length) {
            this.state.localizedBookNamesCache[this.state.translation] = staticMap;
            return staticMap;
          }

          // Fallback: try to fetch from API
          const fallbackMap = Object.fromEntries(
            canonicalBooks.map((book) => [book, book]),
          );
          const baseUrl = getTranslationBaseUrl(this.state.translation);

          try {
            const res = await fetch(`${baseUrl}/index.json`);
            if (!res.ok) {
              const partialStaticMap = Object.keys(staticMap).length > 0
                ? staticMap
                : fallbackMap;

              this.state.localizedBookNamesCache[this.state.translation] =
                partialStaticMap;

              return partialStaticMap;
            }

            const translationIndex = await res.json();
            const indexBooks = Array.isArray(translationIndex.books)
              ? translationIndex.books
              : [];

            if (indexBooks.length === 0) {
              const partialStaticMap = Object.keys(staticMap).length > 0
                ? staticMap
                : fallbackMap;

              this.state.localizedBookNamesCache[this.state.translation] =
                partialStaticMap;

              return partialStaticMap;
            }

            const bookNameMap = {};
            for (let i = 0; i < canonicalBooks.length; i++) {
              const book = canonicalBooks[i];
              const localizedName = indexBooks[i]?.name;

              bookNameMap[book] =
                typeof localizedName === "string" && localizedName.trim()
                  ? localizedName
                  : staticMap[book] || book;
            }

            this.state.localizedBookNamesCache[this.state.translation] =
              bookNameMap;

            return bookNameMap;
          } catch (error) {
            console.warn("Failed to load localized book names", error);

            const partialStaticMap = Object.keys(staticMap).length > 0
              ? staticMap
              : fallbackMap;

            this.state.localizedBookNamesCache[this.state.translation] =
              partialStaticMap;

            return partialStaticMap;
          }
        }

        getCurrentLanguageCode() {
          return getSelectedTranslation(this.state.translation).language;
        }

        getDefaultFilteredBooks(canonicalBooks) {
          const canonicalBookSet = new Set(canonicalBooks);
          const filtered = COMMUNITY_DEFAULT_CANONICAL_BOOKS.filter((book) =>
            canonicalBookSet.has(book),
          );

          return filtered.length > 0 ? filtered : canonicalBooks;
        }

        updateUI() {
          const root = this.shadowRoot;
          const content = root.getElementById("mainContent");

          if (this.state.loading) {
            content.innerHTML =
              '<div class="game__state-message">Loading today\'s verse...</div>';

            return;
          }

          if (this.state.error) {
            content.innerHTML = `<div class="game__state-message game__state-message--error">${this.state.error}</div>`;

            return;
          }

          let html = `
            <div class="game__verse-card">
              <div class="game__verse-text">"${this.escapeHtml(this.state.verseText)}"</div>
              <div class="game__verse-ref">${this.state.translation} • ${this.state.currentChapter}:${this.state.currentVerseNum} • ${this.state.puzzleMode === PUZZLE_MODE_DAILY ? "Daily" : "Random"}</div>
            </div>

            <div class="game__section" aria-labelledby="guessPrompt">
              <h3 class="game__prompt" id="guessPrompt">What book of the Bible?</h3>
              <div class="game__guesses-grid" id="guessesGrid" role="list" aria-label="Previous guesses">
                ${this.renderGuesses()}
              </div>
              <div id="feedback" class="game__feedback" role="status" aria-live="polite" aria-atomic="true"></div>
              ${this.renderGuessInput()}
              ${this.renderAnswerReveal()}
            </div>
          `;

          content.innerHTML = html;
          this.bindEvents();
        }

        renderGuesses() {
          let html = "";

          const newestIdx = this.state.guesses.length - 1;
          const animateRow = this.state.animateLastRow;

          this.state.animateLastRow = false;

          for (let i = 0; i < this.state.guesses.length; i++) {
            const guess = this.state.guesses[i];
            const isNew = animateRow && i === newestIdx;

            html += '<div class="game__guess-row" role="listitem">';

            for (let j = 0; j < guess.length; j++) {
              const letter = guess[j].letter ?? "";
              const status = guess[j].status;
              const style = isNew
                ? `animation: flipIn 0.6s ease-out ${j * 150}ms both;`
                : "";

              html += `<div class="game__letter-box game__letter-box--${status}" style="${style}">${letter.toUpperCase()}</div>`;
            }

            html += "</div>";
          }

          return html;
        }

        renderGuessInput() {
          const hasPrevious = this.state.puzzleHistoryIndex > 0;
          const hasNext =
            this.state.puzzleHistoryIndex < this.state.puzzleHistory.length - 1;
          const canUseWebShare = this.canUseWebShare();
          const shareActionHtml = this.state.solved
            ? canUseWebShare
              ? '<button class="game__button" id="shareBtn" aria-label="Share this puzzle">Share</button>'
              : '<button class="game__button game__button--secondary" id="copyLinkBtn" aria-label="Copy puzzle link">Copy Link</button>'
            : "";

          const actionsHtml = `
            <div class="game__input-group game__input-group--actions">
              <button class="game__button game__button--secondary" id="resetBtn" aria-label="Back to daily puzzle">Back to Daily</button>
              <button class="game__button" id="newGameBtn" aria-label="Randomize puzzle">Randomize</button>
              <button class="game__button game__button--secondary" id="prevPuzzleBtn" aria-label="Go to previous puzzle" ${hasPrevious ? "" : "disabled"}>Previous</button>
              <button class="game__button game__button--secondary" id="nextPuzzleBtn" aria-label="Go to next puzzle" ${hasNext ? "" : "disabled"}>Next</button>
              ${shareActionHtml}
            </div>
          `;

          if (this.state.gameOver) {
            return actionsHtml;
          }

          return `
            <div class="game__autocomplete-wrapper" id="autocompleteWrapper">
              <div class="game__input-group">
                <input
                  class="game__input"
                  type="text"
                  id="guessInput"
                  placeholder="Type book name..."
                  autocomplete="off"
                  aria-label="Guess Bible book"
                  aria-autocomplete="list"
                  aria-controls="suggestionsList"
                  aria-expanded="${this.state.suggestionList.length > 0 ? "true" : "false"}"
                  aria-describedby="feedback"
                  ${this.state.attempts >= 6 ? "disabled" : ""}
                >
                <button class="game__button game__button--submit" id="submitBtn" aria-label="Submit guess" ${this.state.attempts >= 6 ? "disabled" : ""}>
                  Guess
                </button>
              </div>
              <ul class="game__suggestions" id="suggestionsList" role="listbox" aria-label="Book name suggestions"></ul>
            </div>
            ${actionsHtml}
          `;
        }

        renderAnswerReveal() {
          if (!this.state.gameOver) return "";

          return `
            <div class="game__answer-reveal game__answer-reveal--show">
              <strong class="game__answer-label">Answer:</strong> ${this.escapeHtml(this.state.currentBookDisplay || this.state.currentBook)}
              ${this.state.currentChapter}:${this.state.currentVerseNum}
            </div>
          `;
        }

        bindEvents() {
          const input = this.shadowRoot.getElementById("guessInput");
          const submitBtn = this.shadowRoot.getElementById("submitBtn");
          const feedback = this.shadowRoot.getElementById("feedback");
          const resetBtn = this.shadowRoot.getElementById("resetBtn");
          const newGameBtn = this.shadowRoot.getElementById("newGameBtn");
          const prevPuzzleBtn = this.shadowRoot.getElementById("prevPuzzleBtn");
          const nextPuzzleBtn = this.shadowRoot.getElementById("nextPuzzleBtn");
          const shareBtn = this.shadowRoot.getElementById("shareBtn");
          const copyLinkBtn = this.shadowRoot.getElementById("copyLinkBtn");

          if (input) {
            input.focus();
            input.addEventListener("input", () => this.handleInput(input));
            input.addEventListener("keydown", (e) =>
              this.handleInputKeydown(e, input, feedback),
            );

            if (this.state.pendingGuessInput) {
              input.value = this.state.pendingGuessInput;
              this.state.pendingGuessInput = "";
              this.handleInput(input);
            }
          }

          if (submitBtn) {
            submitBtn.addEventListener("click", () => {
              this.clearSuggestions();
              this.handleGuess(input, feedback);
            });
          }

          if (resetBtn) {
            resetBtn.addEventListener("click", () => this.resetCurrentGame());
          }

          if (newGameBtn) {
            newGameBtn.addEventListener("click", () => this.startRandomGame());
          }

          if (prevPuzzleBtn) {
            prevPuzzleBtn.addEventListener("click", () => this.goToPuzzleHistory(-1));
          }

          if (nextPuzzleBtn) {
            nextPuzzleBtn.addEventListener("click", () => this.goToPuzzleHistory(1));
          }

          if (shareBtn) {
            shareBtn.addEventListener("click", () => this.handleSharePuzzle(feedback));
          }

          if (copyLinkBtn) {
            copyLinkBtn.addEventListener("click", () => this.copyPuzzleLink(feedback));
          }

          const wrapper = this.shadowRoot.getElementById("autocompleteWrapper");
          if (wrapper) {
            wrapper.addEventListener("focusout", () => {
              setTimeout(() => {
                if (!wrapper.contains(this.shadowRoot.activeElement)) {
                  this.clearSuggestions();
                }
              }, 150);
            });
          }
        }

        handleGuess(input, feedbackEl) {
          if (!input || this.state.gameOver) return;

          const guess = this.sanitizeGuess(input.value);
          input.value = guess;
          if (!guess) {
            feedbackEl.textContent = "Please enter a book name.";
            feedbackEl.className =
              "game__feedback game__feedback--show game__feedback--incorrect";

            return;
          }

          const guessNorm = this.normalizeForMatch(guess);
          const targetDisplay = this.state.currentBookDisplay || this.state.currentBook;
          const targetDisplayNorm = this.normalizeForMatch(targetDisplay);
          const targetCanonicalNorm = this.normalizeForMatch(this.state.currentBook);
          const isCorrect =
            guessNorm === targetDisplayNorm || guessNorm === targetCanonicalNorm;
          const evaluation = evaluateGuess(guess, targetDisplay);

          // Store guess
          const guessRow = evaluation.map((status, i) => ({
            letter: guess[i],
            status,
          }));

          // Indicate the answer continues beyond what was typed
          if (!isCorrect && guess.length < targetDisplay.length) {
            guessRow.push({ letter: "+", status: "more" });
          }

          this.state.guesses.push(guessRow);

          this.state.attempts++;

          if (isCorrect) {
            this.state.solved = true;
            this.state.gameOver = true;

            feedbackEl.textContent = `🎉 Correct! The book is ${targetDisplay}.`;
            feedbackEl.className =
              "game__feedback game__feedback--show game__feedback--correct";
          } else if (this.state.attempts >= 6) {
            this.state.gameOver = true;

            feedbackEl.textContent = `Game Over! The answer was ${targetDisplay}.`;
            feedbackEl.className =
              "game__feedback game__feedback--show game__feedback--incorrect";
          } else {
            feedbackEl.textContent = `${6 - this.state.attempts} guesses remaining.`;
            feedbackEl.className =
              "game__feedback game__feedback--show game__feedback--incorrect";
          }

          input.value = "";

          this.state.animateLastRow = true;

          this.updateUI();
        }

        newGame() {
          this.startRandomGame();
        }

        getShareUrl() {
          return `${window.location.origin}${window.location.pathname}${window.location.search}${window.location.hash}`;
        }

        getShareData() {
          const targetDisplay = this.state.currentBookDisplay || this.state.currentBook;
          const gameType = this.state.puzzleMode === PUZZLE_MODE_DAILY ? "Daily" : "Random";
          const guessesUsed = this.state.attempts;

          return {
            title: "Bible Tools - Game",
            text: `I solved the ${gameType} Bible verse puzzle in ${guessesUsed} guess${guessesUsed === 1 ? "" : "es"}! (${targetDisplay} ${this.state.currentChapter}:${this.state.currentVerseNum})`,
            url: this.getShareUrl(),
          };
        }

        canUseWebShare() {
          if (!globalThis.isSecureContext) {
            return false;
          }

          const shareFn = Reflect.get(navigator, "share");
          if (typeof shareFn !== "function") {
            return false;
          }

          const canShareFn = Reflect.get(navigator, "canShare");
          if (typeof canShareFn !== "function") {
            return true;
          }

          try {
            return canShareFn.call(navigator, { url: this.getShareUrl() });
          } catch {
            return false;
          }
        }

        async handleSharePuzzle(feedbackEl) {
          if (!this.state.solved || !this.canUseWebShare()) {
            return;
          }

          const shareFn = Reflect.get(navigator, "share");

          try {
            await shareFn.call(navigator, this.getShareData());
          } catch (error) {
            if (error?.name === "AbortError") {
              return;
            }

            const didCopy = await this.copyPuzzleLink(feedbackEl);
            if (!didCopy && feedbackEl) {
              feedbackEl.textContent = "Could not share this puzzle on this device.";
              feedbackEl.className =
                "game__feedback game__feedback--show game__feedback--incorrect";
            }
          }
        }

        async copyPuzzleLink(feedbackEl) {
          const shareUrl = this.getShareUrl();
          const clipboard = Reflect.get(navigator, "clipboard");
          const writeText = clipboard
            ? Reflect.get(clipboard, "writeText")
            : undefined;

          if (typeof writeText === "function") {
            try {
              await writeText.call(clipboard, shareUrl);

              if (feedbackEl) {
                feedbackEl.textContent = "Puzzle link copied. Share it with a friend!";
                feedbackEl.className =
                  "game__feedback game__feedback--show game__feedback--hint";
              }

              return true;
            } catch {
              // Fall through to manual fallback prompt.
            }
          }

          const copied = globalThis.prompt(
            "Copy this puzzle link and share it:",
            shareUrl,
          );

          if (feedbackEl && copied !== null) {
            feedbackEl.textContent = "Puzzle link ready to share.";
            feedbackEl.className =
              "game__feedback game__feedback--show game__feedback--hint";
          }

          return copied !== null;
        }

        escapeHtml(text) {
          const div = document.createElement("div");
          div.textContent = text;

          return div.innerHTML;
        }

        normalizeForMatch(text) {
          return text
            .trim()
            .toLowerCase()
            .normalize("NFD")
            .replace(/\p{Diacritic}/gu, "");
        }

        sanitizeGuess(text) {
          return String(text || "").trim();
        }

        handleInput(input) {
          if (this.state.gameOver) {
            this.clearSuggestions();
            return;
          }

          const rawValue = input.value;
          const query = this.normalizeForMatch(rawValue);
          if (!this.sanitizeGuess(rawValue)) {
            this.clearSuggestions();
            return;
          }

          const books =
            this.state.localizedBookNames.length > 0
              ? this.state.localizedBookNames
              : this.state.canonicalBooks;
          if (query.length === 0) {
            // If only whitespace was entered, show the full canonical list so
            // users can browse without typing in the translation's script.
            this.state.suggestionList = books;
            this.state.activeSuggestion = -1;
            this.renderSuggestionItems(input);
            return;
          }

          const prefix = books.filter((b) =>
            this.normalizeForMatch(b).startsWith(query),
          );
          const substring = books.filter(
            (b) =>
              !this.normalizeForMatch(b).startsWith(query) &&
              this.normalizeForMatch(b).includes(query),
          );
          const results = [...prefix, ...substring];

          // If there are no matches (for example Latin letters while using an
          // Arabic translation), fall back to the full canonical order list.
          const suggestionList = results.length > 0 ? results : books;

          this.state.suggestionList = suggestionList;
          this.state.activeSuggestion = -1;
          this.renderSuggestionItems(input);
        }

        renderSuggestionItems(input) {
          const list = this.shadowRoot.getElementById("suggestionsList");
          if (!list) return;

          if (input) {
            input.setAttribute(
              "aria-expanded",
              this.state.suggestionList.length > 0 ? "true" : "false",
            );
          }

          if (this.state.suggestionList.length === 0) {
            list.innerHTML = "";
            return;
          }

          list.innerHTML = this.state.suggestionList
            .map((book, index) => {
              const isActive = index === this.state.activeSuggestion;
              return `<li class="game__suggestion-item" role="option" id="suggestion-${index}" aria-selected="${isActive ? "true" : "false"}" data-value="${this.escapeHtml(book)}">${this.escapeHtml(book)}</li>`;
            })
            .join("");

          list.querySelectorAll(".game__suggestion-item").forEach((item) => {
            item.addEventListener("mousedown", (e) => {
              e.preventDefault();
              this.selectSuggestion(input, item.dataset.value);
            });
          });
        }

        handleInputKeydown(e, input, feedback) {
          const list = this.state.suggestionList;
          const len = list.length;

          if (e.key === "ArrowDown") {
            e.preventDefault();
            this.state.activeSuggestion =
              len === 0 ? -1 : (this.state.activeSuggestion + 1) % len;
            this.updateActiveSuggestion();
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            this.state.activeSuggestion =
              len === 0
                ? -1
                : (this.state.activeSuggestion - 1 + len) % len;
            this.updateActiveSuggestion();
          } else if (e.key === "Enter") {
            if (this.state.activeSuggestion >= 0 && len > 0) {
              e.preventDefault();
              this.selectSuggestion(input, list[this.state.activeSuggestion]);
            } else {
              this.clearSuggestions();
              this.handleGuess(input, feedback);
            }
          } else if (e.key === "Escape") {
            this.clearSuggestions();
          }
        }

        selectSuggestion(input, bookName) {
          input.value = bookName;
          this.clearSuggestions();
          input.focus();
        }

        clearSuggestions() {
          this.state.suggestionList = [];
          this.state.activeSuggestion = -1;
          const list = this.shadowRoot.getElementById("suggestionsList");
          const input = this.shadowRoot.getElementById("guessInput");
          if (list) list.innerHTML = "";

          if (input) {
            input.setAttribute("aria-expanded", "false");
            input.removeAttribute("aria-activedescendant");
          }
        }

        updateActiveSuggestion() {
          const list = this.shadowRoot.getElementById("suggestionsList");
          const input = this.shadowRoot.getElementById("guessInput");
          if (!list) return;

          list.querySelectorAll(".game__suggestion-item").forEach((item, i) => {
            const isActive = i === this.state.activeSuggestion;
            item.classList.toggle(
              "game__suggestion-item--active",
              isActive,
            );
            item.setAttribute("aria-selected", isActive ? "true" : "false");

            if (isActive) {
              item.scrollIntoView({ block: "nearest" });
            }
          });

          if (input) {
            if (this.state.activeSuggestion >= 0) {
              input.setAttribute(
                "aria-activedescendant",
                `suggestion-${this.state.activeSuggestion}`,
              );
            } else {
              input.removeAttribute("aria-activedescendant");
            }
          }
        }
      }

      populateTranslationSelect(resolveInitialTranslationVersion());

      customElements.define("bible-tools-game", BibleToolsGame);

      // Theme toggle
      const THEME_STORAGE_KEY = "bible-tools-game-theme";
      const themeToggle = document.getElementById("themeToggle");
      const titleReloadLink = document.getElementById("titleReloadLink");
      const html = document.documentElement;

      titleReloadLink?.addEventListener("click", (event) => {
        if (event.defaultPrevented || event.button !== 0) {
          return;
        }

        if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
          return;
        }

        event.preventDefault();
        const params = new URLSearchParams(window.location.search);
        params.set("mode", PUZZLE_MODE_DAILY);
        params.set("puzzle", makeDailyPuzzleId(getLocalDateKey()));

        const nextUrl = `${window.location.pathname}?${params.toString()}${window.location.hash}`;
        window.location.assign(nextUrl);
      });

      function getStoredThemePreference() {
        const storedTheme = localStorage.getItem(THEME_STORAGE_KEY);

        return storedTheme === "dark" ? "dark" : "light";
      }

      function applyTheme(theme, persist = false) {
        const isDark = theme === "dark";

        if (isDark) {
          html.setAttribute("data-theme", "dark");
          themeToggle.textContent = "☀️ Light";
        } else {
          html.removeAttribute("data-theme");
          themeToggle.textContent = "🌙 Dark";
        }

        themeToggle.setAttribute("aria-pressed", isDark ? "true" : "false");

        if (persist) {
          localStorage.setItem(THEME_STORAGE_KEY, isDark ? "dark" : "light");
        }
      }

      applyTheme(getStoredThemePreference());

      themeToggle.addEventListener("click", () => {
        const nextTheme = html.getAttribute("data-theme") === "dark"
          ? "light"
          : "dark";

        applyTheme(nextTheme, true);
      });
    </script>
  </body>
</html>

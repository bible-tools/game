<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
    <title>Bible Tools - Game</title>
    <style>
      :root {
        --absent: #939194;
        --accent-hover: #45a049;
        --accent: #4caf50;
        --bg-primary: #f0f0f0;
        --bg-secondary: #ffffff;
        --border: #cccccc;
        --correct: #66bb6a;
        --error: #d32f2f;
        --input-bg: #ffffff;
        --present: #f3b72e;
        --success: #2e7d32;
        --text-primary: #333333;
        --text-secondary: #555555;

        --link-color: #1a6b1a;
        --link-hover: #0d3d0d;
      }

      [data-theme="dark"] {
        --absent: #48494b;
        --accent-hover: #66bb6a;
        --accent: #4caf50;
        --bg-primary: #1a1a2e;
        --bg-secondary: #16213e;
        --border: #444444;
        --correct: #66bb6a;
        --error: #ef5350;
        --input-bg: #0f3460;
        --present: #f3b72e;
        --success: #66bb6a;
        --text-primary: #eaeaea;
        --text-secondary: #b0b0b0;

        --link-color: #81c784;
        --link-hover: #a5d6a7;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        padding: 0.875rem;
        transition:
          background 0.3s,
          color 0.3s;
      }

      .page {
        margin: 0 auto;
        max-width: 45rem;
      }

      .page__header {
        align-items: flex-start;
        display: flex;
        flex-direction: column;
        gap: 0.625rem;
        margin-bottom: 1.25rem;
      }

      .page__header-bar {
        align-items: center;
        display: flex;
        gap: 1rem;
        justify-content: space-between;
        width: 100%;
      }

      .page__title {
        color: var(--text-primary);
        font-size: 1.3rem;
        display: flex;
        flex: 1;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        min-width: 0;
      }

      .page__title-link--icon {
        text-decoration: none;
      }

      .page__header-actions {
        align-items: center;
        display: inline-flex;
        flex: 0 0 auto;
        gap: 0.5rem;
        margin-left: auto;
      }

      @media (max-width: 30rem) {
        .page__header-bar {
          gap: 0.5rem;
        }

        .page__title {
          flex: 0 0 auto;
        }

        .page__title-link:not(.page__title-link--icon) {
          display: none;
        }

        .page__header-actions {
          gap: 0.375rem;
        }
      }

      .page__controls {
        align-items: center;
        display: flex;
        width: 100%;
        flex-wrap: wrap;
        gap: 0.625rem;
      }

      .page__settings-toggle {
        align-items: center;
        background: var(--bg-secondary);
        border: 0.0625rem solid var(--border);
        border-radius: 999rem;
        color: var(--text-primary);
        cursor: pointer;
        display: inline-flex;
        height: 2.625rem;
        justify-content: center;
        width: 2.625rem;
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s,
          transform 0.2s;
      }

      .page__settings-toggle:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .page__settings-toggle:active {
        transform: scale(0.96);
      }

      .page__settings-toggle:focus-visible {
        outline: 0.125rem solid var(--accent);
        outline-offset: 0.125rem;
      }

      .page__settings-toggle-icon {
        height: 1.125rem;
        width: 1.125rem;
      }

      .page__settings-panel {
        background: var(--bg-secondary);
        border: 0.0625rem solid var(--border);
        border-radius: 0.875rem;
        box-shadow: 0 0.125rem 0.75rem rgba(0, 0, 0, 0.08);
        display: grid;
        gap: 0.875rem;
        margin-bottom: 1.25rem;
        overflow: hidden;
        padding: 0.875rem;
        transition:
          opacity 0.2s ease,
          transform 0.2s ease,
          max-height 0.25s ease,
          margin-top 0.25s ease;
      }

      .page__settings-panel[hidden] {
        display: grid;
        margin-bottom: 0;
        margin-top: -0.5rem;
        max-height: 0;
        opacity: 0;
        padding-bottom: 0;
        padding-top: 0;
        pointer-events: none;
        transform: translateY(-0.5rem);
      }

      .page__settings-group {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 0.625rem;
      }

      .page__settings-group--primary {
        align-items: stretch;
        display: grid;
        gap: 0.625rem;
        grid-template-columns: 1fr;
        width: 100%;
      }

      .page__settings-group--secondary {
        align-items: stretch;
        display: grid;
        gap: 0.5rem;
        width: 100%;
      }

      .page__settings-label {
        font-size: 0.9rem;
        font-weight: 500;
      }

      .page__range {
        flex: 1;
        align-items: center;
        display: flex;
        gap: 0.75rem;
        min-width: 0;
      }

      .page__range-input {
        accent-color: var(--accent);
        appearance: none;
        -webkit-appearance: none;
        background: transparent;
        flex: 1;
        height: 2.25rem;
        touch-action: pan-y;
        width: 100%;
      }

      .page__range-input::-webkit-slider-runnable-track {
        background: var(--border);
        border-radius: 999rem;
        height: 0.375rem;
      }

      .page__range-input::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        background: var(--accent);
        border: 0.125rem solid var(--bg-secondary);
        border-radius: 50%;
        box-shadow: 0 0 0 0.0625rem var(--border);
        height: 1.5rem;
        margin-top: -0.5625rem;
        width: 1.5rem;
      }

      .page__range-input::-moz-range-track {
        background: var(--border);
        border: none;
        border-radius: 999rem;
        height: 0.375rem;
      }

      .page__range-input::-moz-range-thumb {
        background: var(--accent);
        border: 0.125rem solid var(--bg-secondary);
        border-radius: 50%;
        box-shadow: 0 0 0 0.0625rem var(--border);
        height: 1.5rem;
        width: 1.5rem;
      }

      .page__range-value {
        background: rgba(76, 175, 80, 0.14);
        border: 0.0625rem solid var(--border);
        border-radius: 999rem;
        color: var(--text-primary);
        font-size: 0.85rem;
        font-weight: 600;
        min-width: 2.5rem;
        padding: 0.25rem 0.625rem;
        text-align: center;
      }

      .page__translation-select {
        background: var(--input-bg);
        border: 0.0625rem solid var(--border);
        border-radius: 0.375rem;
        color: var(--text-primary);
        font-size: 0.95rem;
        min-height: 2.75rem;
        padding: 0.5rem 0.75rem;
        transition: all 0.2s;
        width: 100%;
      }

      .page__theme-toggle {
        align-items: center;
        background: var(--bg-secondary);
        border: 0.0625rem solid var(--border);
        border-radius: 999rem;
        color: var(--text-primary);
        cursor: pointer;
        display: inline-flex;
        flex: 0 0 auto;
        font-size: 1.125rem;
        justify-content: center;
        height: 2.625rem;
        line-height: 1;
        padding: 0;
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s,
          transform 0.2s;
        width: 2.625rem;
      }

      .page__theme-toggle:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .page__theme-toggle:active {
        transform: scale(0.96);
      }

      .page__theme-toggle:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .page__translation-select:focus-visible,
      .page__theme-toggle:focus-visible {
        outline: 0.125rem solid var(--accent);
        outline-offset: 0.125rem;
      }

      .page__translation-label {
        font-size: 0.9rem;
        font-weight: 500;
      }

      @media (min-width: 34rem) {
        .page__settings-group--primary {
          align-items: center;
          display: flex;
          flex-wrap: wrap;
          justify-content: flex-start;
        }

        .page__settings-group--secondary {
          align-items: center;
          display: flex;
        }

        .page__translation-select {
          width: 100%;
        }

        .page__theme-toggle {
          width: 2.625rem;
        }
      }

      .page__link {
        color: var(--link-color);
        text-decoration: underline;
        text-underline-offset: 0.125rem;
      }

      .page__link:hover {
        color: var(--link-hover);
      }

      .page__link:focus-visible {
        border-radius: 0.125rem;
        outline: 0.125rem solid var(--link-color);
        outline-offset: 0.1875rem;
        text-decoration: none;
      }

      .page__footer {
        color: var(--text-secondary);
        font-size: 0.85rem;
        padding: 0.9375rem;
        text-align: center;
      }

      @media (min-width: 45rem) {
        body {
          padding: 1.25rem;
        }

        .page__header {
          align-items: center;
          flex-direction: row;
          justify-content: space-between;
        }

        .page__header-bar {
          width: 100%;
        }

        .page__title {
          font-size: 1.6rem;
        }

        .page__controls {
          width: auto;
        }

        .page__settings-panel {
          padding: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="page__header">
        <div class="page__header-bar">
          <h1 class="page__title">
            <a
              class="page__link page__title-link page__title-link--icon"
              href="https://bible-tools.github.io/game/"
              aria-label="Bible Tools - Game"
              >📖</a
            >
            <a
              class="page__link page__title-link"
              id="titleReloadLink"
              href="https://bible-tools.github.io/game/"
              aria-label="Bible Tools - Game home"
              >Bible Tools - Game</a
            >
          </h1>
          <div class="page__header-actions">
            <button
              class="page__theme-toggle"
              id="themeToggle"
              aria-label="Switch to dark theme"
              aria-pressed="false"
              type="button"
            >
              🌙
            </button>
            <button
              class="page__settings-toggle"
              id="settingsToggle"
              aria-label="Toggle settings panel"
              aria-controls="settingsPanel"
              aria-expanded="false"
              type="button"
            >
              <svg
                class="page__settings-toggle-icon"
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
              >
                <path
                  fill="currentColor"
                  d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.18 7.18 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 7.88a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.51.4 1.05.71 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.84a.5.5 0 0 0 .49-.42l.36-2.54c.58-.23 1.12-.54 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"
                />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <section
        class="page__settings-panel"
        id="settingsPanel"
        aria-label="Game settings"
        hidden
      >
        <div class="page__settings-group page__settings-group--primary">
          <label
            class="page__translation-label"
            id="translationLabel"
            for="translation"
            >Translation:</label
          >
          <select
            class="page__translation-select"
            id="translation"
            aria-labelledby="translationLabel"
          ></select>
        </div>
        <div class="page__settings-group page__settings-group--secondary">
          <label
            class="page__settings-label"
            id="verseRangeLabel"
            for="verseRange"
            >Verse Range:</label
          >
          <div class="page__range">
            <input
              class="page__range-input"
              id="verseRange"
              type="range"
              min="1"
              max="10"
              step="1"
              value="1"
              aria-labelledby="verseRangeLabel"
            />
            <span
              class="page__range-value"
              id="verseRangeValue"
              aria-live="polite"
              >1</span
            >
          </div>
        </div>
      </section>

      <bible-tools-game id="game"></bible-tools-game>

      <footer class="page__footer">
        <p>
          Data from
          <a
            class="page__link"
            href="https://github.com/bible-tools/data"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="https://github.com/bible-tools/data (opens in new tab)"
            >https://github.com/bible-tools/data</a
          >
          •
          <a class="page__link" href="https://bible-tools.github.io/app/"
            >Bible Tools</a
          >
        </p>
      </footer>
    </div>

    <script type="module">
      const API_ROOT = "https://bible-tools.github.io/data/translations";
      const PUZZLE_MODE_DAILY = "daily";
      const PUZZLE_MODE_RANDOM = "random";
      const UINT32_MASK = 0xffffffff;

      function hashStringToUint32(value) {
        let hash = 0;

        for (let i = 0; i < value.length; i++) {
          hash = (hash << 5) - hash + value.charCodeAt(i);
          hash |= 0;
        }

        return hash >>> 0;
      }

      function getLocalDateKey(date = new Date()) {
        const year = String(date.getFullYear());
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");

        return `${year}-${month}-${day}`;
      }

      function makeDailyPuzzleId(dateKey) {
        return `daily:${dateKey}`;
      }

      function makeRandomPuzzleId(previousId = "") {
        const words = new Uint32Array(3);

        if (globalThis.crypto?.getRandomValues) {
          globalThis.crypto.getRandomValues(words);
        } else {
          words[0] = Math.floor(Math.random() * UINT32_MASK);
          words[1] = Math.floor(Math.random() * UINT32_MASK);
          words[2] = Date.now() & UINT32_MASK;
        }

        const now = Date.now().toString(36);
        const entropy = Array.from(words, (word) => word.toString(36)).join(
          "-",
        );
        let id = `random:${now}:${entropy}`;

        if (id === previousId) {
          id = `${id}:${Math.floor(Math.random() * 1_000_000).toString(36)}`;
        }

        return id;
      }

      function derivePuzzleSelection(reference, puzzleId, books) {
        const canonicalBooks =
          Array.isArray(books) && books.length > 0
            ? books
            : Object.keys(reference?.books || {});

        if (canonicalBooks.length === 0) {
          throw new Error("Reference data does not contain any books");
        }

        const bookSeed = hashStringToUint32(`${puzzleId}|book`);
        const book = canonicalBooks[bookSeed % canonicalBooks.length];
        const chapterKeys = Object.keys(
          reference.books?.[book]?.chapters || {},
        );

        if (chapterKeys.length === 0) {
          throw new Error(`Book has no chapters: ${book}`);
        }

        const chapterSeed = hashStringToUint32(`${puzzleId}|${book}|chapter`);
        const chapterKey = chapterKeys[chapterSeed % chapterKeys.length];
        const chapterData = reference.books[book].chapters[chapterKey];
        const verseCount = Number(chapterData.verses) || 0;

        if (verseCount <= 0) {
          throw new Error(`Chapter has no verses: ${book} ${chapterKey}`);
        }

        const verseSeed = hashStringToUint32(
          `${puzzleId}|${book}|${chapterKey}|verse`,
        );
        const verseNum = (verseSeed % verseCount) + 1;

        return {
          book,
          chapter: Number.parseInt(chapterKey, 10),
          chapterKey,
          verseNum,
        };
      }

      const MIN_VERSE_RANGE = 1;
      const MAX_VERSE_RANGE = 10;

      function normalizeSearchText(value) {
        return String(value || "")
          .normalize("NFKD")
          .replace(/[\p{M}]/gu, "")
          .toLowerCase()
          .replace(/[^\p{L}\p{N}]+/gu, " ")
          .trim()
          .replace(/\s+/g, " ");
      }

      function getBookSearchTerms(bookName) {
        const normalized = normalizeSearchText(bookName);

        if (!normalized) {
          return [];
        }

        const terms = new Set([normalized]);
        const stemmed = normalized.replace(/^(?:[\p{N}]+|[ivx]+)[\s.]+/iu, "");

        if (stemmed && stemmed !== normalized) {
          terms.add(stemmed);
        }

        return Array.from(terms);
      }

      function verseContainsBookName(verseText, bookName) {
        const normalizedVerse = ` ${normalizeSearchText(verseText)} `;
        const bookNames = Array.isArray(bookName) ? bookName : [bookName];

        return bookNames.some((name) =>
          getBookSearchTerms(name).some((term) =>
            normalizedVerse.includes(` ${term} `),
          ),
        );
      }

      function clampVerseRange(value, maxValue) {
        const parsedValue = Number.parseInt(value, 10);
        const upperBound = Math.max(
          MIN_VERSE_RANGE,
          maxValue || MAX_VERSE_RANGE,
        );

        if (!Number.isFinite(parsedValue)) {
          return MIN_VERSE_RANGE;
        }

        return Math.min(Math.max(parsedValue, MIN_VERSE_RANGE), upperBound);
      }

      function getChapterVerseCount(reference, book, chapterKey) {
        return (
          Number(reference?.books?.[book]?.chapters?.[chapterKey]?.verses) || 0
        );
      }

      function formatVerseReference(chapter, startVerse, endVerse) {
        if (!chapter || !startVerse) {
          return "";
        }

        const hasRange = endVerse && endVerse > startVerse;

        return hasRange
          ? `${chapter}:${startVerse}-${endVerse}`
          : `${chapter}:${startVerse}`;
      }

      function joinVerseTexts(verseTexts) {
        return verseTexts.filter(Boolean).join(" ");
      }

      // Definitive translation options from https://bible-tools.github.io/app/dist/esm/BibleToolsPreferences.js.
      const preferences = {
        defaultVersion: "KJV",
        translations: [
          {
            language: "ar",
            version: "AraSVD",
            label: "AraSVD",
            languageLabel: "Arabic",
          },
          {
            language: "en",
            version: "KJV",
            label: "KJV",
            languageLabel: "English",
          },
          {
            language: "en",
            version: "ASV",
            label: "ASV",
            languageLabel: "English",
          },
          {
            language: "en",

          },
          {
            language: "fr",

          },
          {

            languageLabel: "Spanish",
          },
        ],
      };

      const translationByVersion = Object.fromEntries(
        preferences.translations.map((translation) => [
          translation.version,
          translation,
        ]),
      );

      // Static mapping of canonical book names across all translations (1-66 Protestant canon)

      function getSelectedTranslation(version) {
        return (
          translationByVersion[version] ||
          translationByVersion[preferences.defaultVersion]
        );
      }

      function getTranslationBaseUrl(version) {
        const selected = getSelectedTranslation(version);

        return `${API_ROOT}/${selected.language}/${selected.version}`;
      }

      function resolveTranslationVersion(rawVersion) {
        if (!rawVersion) {
          return preferences.defaultVersion;
        }

        if (translationByVersion[rawVersion]) {
          return rawVersion;
        }

        const normalizedVersion = rawVersion.toLowerCase();
        const matchedTranslation = preferences.translations.find(
          (translation) =>
            translation.version.toLowerCase() === normalizedVersion,
        );

        return matchedTranslation?.version || preferences.defaultVersion;
      }

      function resolveInitialTranslationVersion() {
        const rawParam = new URLSearchParams(window.location.search).get(
          "translation",
        );

        return resolveTranslationVersion(rawParam);
      }

      function populateTranslationSelect(selectedVersion) {
        const select = document.getElementById("translation");
        if (!select) {
          return;
        }

        select.innerHTML = preferences.translations
          .map(
            (translation) =>
              `<option value="${translation.version}">${translation.languageLabel} - ${translation.label}</option>`,
          )
          .join("");

        select.value = getSelectedTranslation(selectedVersion).version;
      }

      // Letter evaluation
      function evaluateGuess(guess, target) {
        const result = [];
        const targetChars = target.toLowerCase().split("");
        const guessChars = guess.toLowerCase().split("");

        // First pass: mark correct positions
        for (let i = 0; i < guessChars.length; i++) {
          if (guessChars[i] === targetChars[i]) {
            result[i] = "correct";

            targetChars[i] = null;
          } else {
            result[i] = "absent";
          }
        }

        // Second pass: mark present letters
        for (let i = 0; i < guessChars.length; i++) {
          if (result[i] !== "correct") {
            const idx = targetChars.indexOf(guessChars[i]);
            if (idx !== -1) {
              result[i] = "present";

              targetChars[idx] = null;
            }
          }
        }

        return result;
      }

            ?.addEventListener("input", (e) =>

        setupGlobalEvents() {
          window.addEventListener("popstate", this.onPopState);
          window.addEventListener("focus", this.onVisibilityOrFocus);
          document.addEventListener(
            "visibilitychange",
            this.onVisibilityOrFocus,
          );

        applyUrlState({ addHistoryEntry }) {
          const params = new URLSearchParams(window.location.search);
          const requestedTranslation = params.get("translation");

          this.state.translation =
            resolveTranslationVersion(requestedTranslation);

          const translationSelect = document.getElementById("translation");
          if (translationSelect) {
            translationSelect.value = this.state.translation;
          }

          const requestedMode = params.get("mode");
          const puzzleMode =
            requestedMode === PUZZLE_MODE_RANDOM
              ? PUZZLE_MODE_RANDOM
              : PUZZLE_MODE_DAILY;
          const requestedPuzzleId = params.get("puzzle");
          const legacyHashParam = params.get("hash");
          const legacyHash = Number.parseInt(legacyHashParam ?? "", 10);
          const localDateKey = getLocalDateKey();

          this.state.dailyDateKey = localDateKey;

          let nextMode = puzzleMode;
          let nextPuzzleId = requestedPuzzleId;

          if (!nextPuzzleId) {
            if (Number.isFinite(legacyHash)) {
              nextMode = PUZZLE_MODE_RANDOM;
              nextPuzzleId = `legacy:${Math.abs(legacyHash)}`;
            } else {
              nextMode = PUZZLE_MODE_DAILY;
              nextPuzzleId = makeDailyPuzzleId(localDateKey);
            }
          }

          this.setPuzzle(nextPuzzleId, nextMode, {
            addHistoryEntry,
            pushUrl: false,
            replaceCurrentHistoryEntry: !addHistoryEntry,
          });
          this.updateUrlState({ push: false });
        }

        updateUrlState({ push }) {
          const params = new URLSearchParams(window.location.search);
          params.set("mode", this.state.puzzleMode);
          params.set("puzzle", this.state.puzzleId);
          params.set("translation", this.state.translation);

          const nextQuery = params.toString();
          const nextUrl = `${window.location.pathname}?${nextQuery}${window.location.hash}`;

          if (push) {
            window.history.pushState(null, "", nextUrl);
          } else {
            window.history.replaceState(null, "", nextUrl);
          }
        }

        setPuzzle(
          puzzleId,
          puzzleMode,
          { addHistoryEntry, pushUrl, replaceCurrentHistoryEntry = false },
        ) {
          this.state.puzzleId = puzzleId;
          this.state.puzzleMode = puzzleMode;

          if (addHistoryEntry) {
            this.pushPuzzleHistoryEntry(
              {
                translation: this.state.translation,
                puzzleMode: this.state.puzzleMode,
                puzzleId: this.state.puzzleId,
              },
              replaceCurrentHistoryEntry,
            );
          }

          if (typeof pushUrl === "boolean") {
            this.updateUrlState({ push: pushUrl });
          }
        }

        pushPuzzleHistoryEntry(entry, replaceCurrentHistoryEntry = false) {
          if (
            replaceCurrentHistoryEntry &&
            this.state.puzzleHistoryIndex >= 0 &&
            this.state.puzzleHistoryIndex < this.state.puzzleHistory.length
          ) {
            this.state.puzzleHistory[this.state.puzzleHistoryIndex] = entry;

            return;
          }

          const nextIndex = this.state.puzzleHistoryIndex + 1;

          this.state.puzzleHistory = this.state.puzzleHistory.slice(
            0,
            nextIndex,
          );
          this.state.puzzleHistory.push(entry);
          this.state.puzzleHistoryIndex = this.state.puzzleHistory.length - 1;
        }

        resetPlayState() {
          this.state.guesses = [];
          this.state.attempts = 0;
          this.state.solved = false;
          this.state.gameOver = false;
          this.state.suggestionList = [];
          this.state.activeSuggestion = -1;
          this.state.animateLastRow = false;
        }

        handleTranslationChange(nextTranslation) {
          if (!translationByVersion[nextTranslation]) {
            return;
          }

          const input = this.shadowRoot?.getElementById("guessInput");

          this.state.pendingGuessInput = input?.value?.trim() || "";
          this.state.translation = nextTranslation;
          this.state.referenceCache = null;
          this.state.canonicalBooks = [];
          this.state.filteredCanonicalBooks = [];
          this.state.localizedBookNames = [];
          this.state.bookNameMap = {};
          this.resetPlayState();

          if (this.state.puzzleMode === PUZZLE_MODE_DAILY) {
            this.state.dailyDateKey = getLocalDateKey();
            this.setPuzzle(
              makeDailyPuzzleId(this.state.dailyDateKey),
              PUZZLE_MODE_DAILY,
              { addHistoryEntry: true, pushUrl: true },
            );
          } else {
            this.setPuzzle(
              this.state.puzzleId || makeRandomPuzzleId(),
              PUZZLE_MODE_RANDOM,
              {
                addHistoryEntry: true,
                pushUrl: true,
              },
            );
          }

          this.loadGame();
        }

        handleVerseRangeChange(nextValue, { preserveGuessInput = false } = {}) {
          const input = this.shadowRoot?.getElementById("guessInput");

          if (preserveGuessInput) {
            this.state.pendingGuessInput = input?.value ?? "";
          }

          if (
            !this.state.currentBook ||
            !this.state.currentChapter ||
            !this.state.currentVerseNum
          ) {
            const rangeValue = clampVerseRange(
              nextValue,
              this.state.verseRangeMax,
            );
            this.state.verseRange = rangeValue;
            this.syncVerseRangeControls();

            return;
          }

          void this.applyVerseRange(nextValue, { focusGuessInput: false });
        }

        resetCurrentGame() {
          if (this.state.puzzleMode === PUZZLE_MODE_RANDOM) {
            this.startDailyGame();

            return;
          }

          this.restartCurrentPuzzle();
        }

        restartCurrentPuzzle() {
          this.state.pendingGuessInput = "";
          this.resetPlayState();
          this.updateUI();
        }

        startDailyGame() {
          this.state.dailyDateKey = getLocalDateKey();
          this.state.pendingGuessInput = "";
          this.resetPlayState();
          this.setPuzzle(
            makeDailyPuzzleId(this.state.dailyDateKey),
            PUZZLE_MODE_DAILY,
            { addHistoryEntry: true, pushUrl: true },
          );
          this.loadGame();
        }

        startRandomGame() {
          this.state.pendingGuessInput = "";
          this.resetPlayState();

          let nextPuzzleId = makeRandomPuzzleId(this.state.puzzleId || "");

          for (let i = 0; i < 5 && nextPuzzleId === this.state.puzzleId; i++) {
            nextPuzzleId = makeRandomPuzzleId(this.state.puzzleId || "");
          }

          this.setPuzzle(nextPuzzleId, PUZZLE_MODE_RANDOM, {
            addHistoryEntry: true,
            pushUrl: true,
          });

          this.loadGame();
        }

        goToPuzzleHistory(direction) {
          const nextIndex = this.state.puzzleHistoryIndex + direction;

          if (nextIndex < 0 || nextIndex >= this.state.puzzleHistory.length) {
            return;
          }

          const entry = this.state.puzzleHistory[nextIndex];
          const translationChanged =
            entry.translation !== this.state.translation;

          this.state.puzzleHistoryIndex = nextIndex;
          this.state.puzzleId = entry.puzzleId;
          this.state.puzzleMode = entry.puzzleMode;
          this.state.translation = entry.translation;

          if (translationChanged) {
            this.state.referenceCache = null;
            this.state.canonicalBooks = [];
            this.state.filteredCanonicalBooks = [];
            this.state.localizedBookNames = [];
            this.state.bookNameMap = {};

            const translationSelect = document.getElementById("translation");
            if (translationSelect) {
              translationSelect.value = this.state.translation;
            }
          }

          this.state.pendingGuessInput = "";
          this.resetPlayState();
          this.updateUrlState({ push: false });
          this.loadGame();
        }

        refreshDailyPuzzleIfNeeded() {
          if (this.state.puzzleMode !== PUZZLE_MODE_DAILY) {
            return;
          }

          const localDateKey = getLocalDateKey();

          if (localDateKey === this.state.dailyDateKey) {
            return;
          }

          this.state.dailyDateKey = localDateKey;
          this.state.pendingGuessInput = "";
          this.resetPlayState();

          this.setPuzzle(makeDailyPuzzleId(localDateKey), PUZZLE_MODE_DAILY, {
            addHistoryEntry: true,
            pushUrl: true,
          });

          this.loadGame();
        }

        scheduleDailyRolloverCheck() {
          if (this.midnightTimerId) {
            clearTimeout(this.midnightTimerId);
          }

          const now = new Date();
          const nextMidnight = new Date(now);
          nextMidnight.setHours(24, 0, 0, 50);

          this.midnightTimerId = setTimeout(() => {
            this.refreshDailyPuzzleIfNeeded();
            this.scheduleDailyRolloverCheck();
          }, nextMidnight.getTime() - now.getTime());
        }

        async loadGame() {
          if (!this.state.puzzleId) {
            this.state.dailyDateKey = getLocalDateKey();
            this.setPuzzle(
              makeDailyPuzzleId(this.state.dailyDateKey),
              PUZZLE_MODE_DAILY,
              { addHistoryEntry: true, pushUrl: false },
            );
          }

          this.state.loading = true;
          this.state.error = null;
          this.state.currentVerseEndNum = null;
          this.state.verseRange = MIN_VERSE_RANGE;
          this.state.verseRangeMax = MAX_VERSE_RANGE;
          this.syncVerseRangeControls();
          this.updateUI();

          try {
            // Load reference data
            const reference = await this.getReference();

            // Build list of canonical books
            if (this.state.canonicalBooks.length === 0) {
              this.state.canonicalBooks = Object.keys(reference.books);
            }

            this.state.bookNameMap = await this.getBookNameMap(reference);
            this.state.filteredCanonicalBooks = this.getDefaultFilteredBooks(
              this.state.canonicalBooks,
            );

            if (this.state.filteredCanonicalBooks.length === 0) {
              throw new Error(
                "No books available after applying default filter",
              );
            }

            this.state.localizedBookNames =
              this.state.filteredCanonicalBooks.map(
                (book) => this.state.bookNameMap[book] || book,
              );

            const selection = derivePuzzleSelection(
              reference,
              this.state.puzzleId,
              this.state.filteredCanonicalBooks,
            );

            const validSelection = await this.findValidVerseSelection(
              reference,
              selection,
            );

            this.state.currentBook = validSelection.selection.book;
            this.state.currentBookDisplay =
              this.state.bookNameMap[validSelection.selection.book] ||
              validSelection.selection.book;
            this.state.currentChapter = validSelection.selection.chapter;
            this.state.currentVerseNum = validSelection.selection.verseNum;
            this.state.verseText = validSelection.verseData.text;
            this.state.loading = false;

            await this.applyVerseRange(MIN_VERSE_RANGE, {
              initialVerseText: validSelection.verseData.text,
            });
          } catch (err) {
            console.error("Error loading game:", err);

            this.state.error = "Failed to load today's verse. Try again later.";
            this.state.loading = false;

            this.updateUI();
          }
        }

        async getReference() {
          if (!this.state.referenceCache) {
            const baseUrl = getTranslationBaseUrl(this.state.translation);
            const res = await fetch(`${baseUrl}/reference.json`);

            if (!res.ok) {
              throw new Error("Failed to fetch reference");
            }

            this.state.referenceCache = await res.json();
          }

          return this.state.referenceCache;
        }

        async fetchVerse(book, chapter, verse) {
          const baseUrl = getTranslationBaseUrl(this.state.translation);
          const bookUrl = encodeURIComponent(book);
          const url = `${baseUrl}/${bookUrl}/${chapter}/${verse}/index.json`;
          const res = await fetch(url);

          if (!res.ok) {
            throw new Error(`Verse not found: ${url}`);
          }

          return res.json();
        }

        getVerseRangeLimit(reference, book, chapterKey, verseNum) {
          const verseCount = getChapterVerseCount(reference, book, chapterKey);

          if (verseCount <= 0) {
            return MIN_VERSE_RANGE;
          }

          return Math.min(MAX_VERSE_RANGE, verseCount - verseNum + 1);
        }

        syncVerseRangeControls() {
          const rangeInput = document.getElementById("verseRange");
          const rangeValueLabel = document.getElementById("verseRangeValue");
          const rangeValue = clampVerseRange(
            this.state.verseRange,
            this.state.verseRangeMax,
          );

          this.state.verseRange = rangeValue;

          if (rangeInput) {
            rangeInput.min = String(MIN_VERSE_RANGE);
            rangeInput.max = String(
              Math.max(MIN_VERSE_RANGE, this.state.verseRangeMax),
            );
            rangeInput.step = "1";
            rangeInput.value = String(rangeValue);
          }

          if (rangeValueLabel) {
            rangeValueLabel.textContent = String(rangeValue);
          }
        }

        formatVerseReference() {
          return formatVerseReference(
            this.state.currentChapter,
            this.state.currentVerseNum,
            this.state.currentVerseEndNum || this.state.currentVerseNum,
          );
        }

        async applyVerseRange(
          nextValue,
          { focusGuessInput = true, initialVerseText = null } = {},
        ) {
          if (
            !this.state.currentBook ||
            !this.state.currentChapter ||
            !this.state.currentVerseNum
          ) {
            return;
          }

          const reference = await this.getReference();
          const chapterKey = String(this.state.currentChapter);
          const rangeMax = this.getVerseRangeLimit(
            reference,
            this.state.currentBook,
            chapterKey,
            this.state.currentVerseNum,
          );
          const rangeValue = clampVerseRange(nextValue, rangeMax);
          const startVerse = this.state.currentVerseNum;
          const endVerse = startVerse + rangeValue - 1;

          this.state.verseRangeMax = rangeMax;
          this.state.verseRange = rangeValue;
          this.state.currentVerseEndNum = endVerse;
          this.syncVerseRangeControls();

          const token = ++this.verseRangeLoadToken;

          if (rangeValue === MIN_VERSE_RANGE && initialVerseText !== null) {
            this.state.verseText = initialVerseText;
            this.updateUI({ focusGuessInput });

            return;
          }

          const verseTexts = [];

          for (let verseNum = startVerse; verseNum <= endVerse; verseNum++) {
            const verseData = await this.fetchVerse(
              this.state.currentBook,
              chapterKey,
              verseNum,
            );

            verseTexts.push(verseData.text);
          }

          if (token !== this.verseRangeLoadToken) {
            return;
          }

          this.state.verseText = joinVerseTexts(verseTexts);
          this.updateUI({ focusGuessInput });
        }

        async findValidVerseSelection(reference, initialSelection) {
          const maxAttempts = 20;
          let selection = initialSelection;
          let lastSuccessfulResult = null;

          for (let attempt = 0; attempt < maxAttempts; attempt++) {
            if (attempt > 0) {
              selection = derivePuzzleSelection(
                reference,
                `${this.state.puzzleId}:${attempt}`,
                this.state.filteredCanonicalBooks,
              );
            }

            const verseData = await this.fetchVerse(
              selection.book,
              selection.chapterKey,
              selection.verseNum,
            );
            lastSuccessfulResult = { selection, verseData };
            // Check both the localized label and the canonical book key so translation-specific naming does not miss a match.
            const bookDisplay = this.state.bookNameMap[selection.book];

            if (
              !verseContainsBookName(verseData.text, [
                bookDisplay,
                selection.book,
              ])
            ) {
              return lastSuccessfulResult;
            }
          }

          return lastSuccessfulResult;
        }

        async getBookNameMap(reference) {
          const cached =
            this.state.localizedBookNamesCache[this.state.translation];
          if (cached) {
            return cached;
          }

          const languageCode = this.getCurrentLanguageCode();
          const canonicalBooks = Object.keys(reference.books);

          // First, build from static canonical book names
          const staticMap = {};
          let builtFromStatic = true;
          const defaultBooksByIndex = COMMUNITY_DEFAULT_CANONICAL_BOOKS;

          for (let i = 0; i < canonicalBooks.length; i++) {
            const book = canonicalBooks[i];
            const canonicalIndex = defaultBooksByIndex.findIndex(
              (defaultBook) => this.isEquivalentBookLabel(book, defaultBook),
            );

            if (canonicalIndex === -1) {
              builtFromStatic = false;

              continue;
            }

            const localized = getCanonicalBookNameByIndex(
              canonicalIndex + 1,
              languageCode,
            );

            if (localized) {
              staticMap[book] = localized;
            } else {
              builtFromStatic = false;
            }
          }

          // If static map was complete, cache and return it
          if (
            builtFromStatic &&
            Object.keys(staticMap).length === canonicalBooks.length
          ) {
            this.state.localizedBookNamesCache[this.state.translation] =
              staticMap;

            return staticMap;
          }

          const bookNameMap = {};
          for (let i = 0; i < canonicalBooks.length; i++) {
            const book = canonicalBooks[i];

            bookNameMap[book] = staticMap[book] || book;
          }

          this.state.localizedBookNamesCache[this.state.translation] =
            bookNameMap;

          return bookNameMap;
        }

        getCurrentLanguageCode() {
          return getSelectedTranslation(this.state.translation).language;
        }

        getDefaultFilteredBooks(canonicalBooks) {
          const filtered = COMMUNITY_DEFAULT_CANONICAL_BOOKS.map(
            (defaultBook) =>
              canonicalBooks.find((canonicalBook) =>
                this.isEquivalentBookLabel(canonicalBook, defaultBook),
              ),
          ).filter(Boolean);

          return filtered.length > 0 ? filtered : canonicalBooks;
        }

        updateUI({ focusGuessInput = true } = {}) {
          this.shouldFocusGuessInput = focusGuessInput;

          const root = this.shadowRoot;
          const content = root.getElementById("mainContent");

          if (this.state.loading) {
            content.innerHTML =
              '<div class="game__state-message">Loading today\'s verse...</div>';

            return;
          }

          if (this.state.error) {
            content.innerHTML = `<div class="game__state-message game__state-message--error">${this.state.error}</div>`;

            return;
          }

          let html = `
            <div class="game__verse-card">
              <div class="game__verse-text">"${this.escapeHtml(this.state.verseText)}"</div>
              <div class="game__verse-ref">${this.state.translation} • ${this.formatVerseReference()} • ${this.state.puzzleMode === PUZZLE_MODE_DAILY ? "Daily" : "Random"}</div>
            </div>

            <div class="game__section" aria-labelledby="guessPrompt">
              <h3 class="game__prompt" id="guessPrompt">What book of the Bible?</h3>
              <div class="game__guesses-grid" id="guessesGrid" role="list" aria-label="Previous guesses">
                ${this.renderGuesses()}
              </div>
              <div id="feedback" class="game__feedback" role="status" aria-live="polite" aria-atomic="true"></div>
              ${this.renderGuessInput()}
              ${this.renderAnswerReveal()}
            </div>
          `;

          content.innerHTML = html;
          this.bindEvents();
        }

        renderGuesses() {
          let html = "";

          const newestIdx = this.state.guesses.length - 1;
          const animateRow = this.state.animateLastRow;

          this.state.animateLastRow = false;

          for (let i = 0; i < this.state.guesses.length; i++) {
            const guess = this.state.guesses[i];
            const isNew = animateRow && i === newestIdx;

            html += '<div class="game__guess-row" role="listitem">';

            for (let j = 0; j < guess.length; j++) {
              const letter = guess[j].letter ?? "";
              const status = guess[j].status;
              const style = isNew
                ? `animation: flipIn 0.6s ease-out ${j * 150}ms both;`
                : "";

              html += `<div class="game__letter-box game__letter-box--${status}" style="${style}">${letter.toUpperCase()}</div>`;
            }

            html += "</div>";
          }

          return html;
        }

        renderGuessInput() {
          const hasPrevious = this.state.puzzleHistoryIndex > 0;
          const hasNext =
            this.state.puzzleHistoryIndex < this.state.puzzleHistory.length - 1;
          const hasRandomizedHistory = this.state.puzzleHistory.some(
            (entry) => entry.puzzleMode === PUZZLE_MODE_RANDOM,
          );
          const primaryActionLabel =
            this.state.puzzleMode === PUZZLE_MODE_RANDOM
              ? "Back to Daily"
              : "Restart";
          const primaryActionAriaLabel =
            this.state.puzzleMode === PUZZLE_MODE_RANDOM
              ? "Back to daily puzzle"
              : "Restart this puzzle";
          const canUseWebShare = this.canUseWebShare();
          const shareActionHtml = this.state.solved
            ? canUseWebShare
              ? '<button class="game__button" id="shareBtn" aria-label="Share this puzzle">Share</button>'
              : '<button class="game__button game__button--secondary" id="copyLinkBtn" aria-label="Copy puzzle link">Copy Link</button>'
            : "";
          const prevPuzzleHtml =
            hasRandomizedHistory && hasPrevious
              ? '<button class="game__button game__button--secondary" id="prevPuzzleBtn" aria-label="Go to previous puzzle">Previous</button>'
              : "";
          const nextPuzzleHtml =
            hasRandomizedHistory && hasNext
              ? '<button class="game__button game__button--secondary" id="nextPuzzleBtn" aria-label="Go to next puzzle">Next</button>'
              : "";

          const actionsHtml = `
            <div class="game__input-group game__input-group--actions">
              <button class="game__button game__button--secondary" id="resetBtn" aria-label="${primaryActionAriaLabel}">${primaryActionLabel}</button>
              <button class="game__button" id="newGameBtn" aria-label="Start a new random puzzle">New Game</button>
              ${prevPuzzleHtml}
              ${nextPuzzleHtml}
              ${shareActionHtml}
            </div>
          `;

          if (this.state.gameOver) {
            return actionsHtml;
          }

          return `
            <div class="game__autocomplete-wrapper" id="autocompleteWrapper">
              <div class="game__input-group">
                <input
                  class="game__input"
                  type="text"
                  id="guessInput"
                  placeholder="Type book name..."
                  autocomplete="off"
                  aria-label="Guess Bible book"
                  aria-autocomplete="list"
                  aria-controls="suggestionsList"
                  aria-expanded="${this.state.suggestionList.length > 0 ? "true" : "false"}"
                  aria-describedby="feedback"
                  ${this.state.attempts >= 6 ? "disabled" : ""}
                >
                <button class="game__button game__button--submit" id="submitBtn" aria-label="Submit guess" ${this.state.attempts >= 6 ? "disabled" : ""}>
                  Guess
                </button>
              </div>
              <ul class="game__suggestions" id="suggestionsList" role="listbox" aria-label="Book name suggestions"></ul>
            </div>
          `;
        }

        renderAnswerReveal() {
          if (!this.state.gameOver) {
            return "";
          }

          return `
            <div class="game__answer-reveal game__answer-reveal--show">
              <strong class="game__answer-label">Answer:</strong> ${this.escapeHtml(this.state.currentBookDisplay || this.state.currentBook)}
              ${this.formatVerseReference()}
            </div>
          `;
        }

        bindEvents() {
          const input = this.shadowRoot.getElementById("guessInput");
          const submitBtn = this.shadowRoot.getElementById("submitBtn");
          const feedback = this.shadowRoot.getElementById("feedback");
          const resetBtn = this.shadowRoot.getElementById("resetBtn");
          const newGameBtn = this.shadowRoot.getElementById("newGameBtn");
          const prevPuzzleBtn = this.shadowRoot.getElementById("prevPuzzleBtn");
          const nextPuzzleBtn = this.shadowRoot.getElementById("nextPuzzleBtn");
          const shareBtn = this.shadowRoot.getElementById("shareBtn");
          const copyLinkBtn = this.shadowRoot.getElementById("copyLinkBtn");

          if (input) {
            if (this.shouldFocusGuessInput) {
              input.focus();
            }

            input.addEventListener("input", () => this.handleInput(input));
            input.addEventListener("keydown", (e) =>
              this.handleInputKeydown(e, input, feedback),
            );

            if (this.state.pendingGuessInput) {
              input.value = this.state.pendingGuessInput;
              this.state.pendingGuessInput = "";
              this.handleInput(input);
            }
          }

          this.shouldFocusGuessInput = true;

          if (submitBtn) {
            submitBtn.addEventListener("click", () => {
              this.clearSuggestions();
              this.handleGuess(input, feedback);
            });
          }

          if (resetBtn) {
            resetBtn.addEventListener("click", () => this.resetCurrentGame());
          }

          if (newGameBtn) {
            newGameBtn.addEventListener("click", () => this.startRandomGame());
          }

          if (prevPuzzleBtn) {
            prevPuzzleBtn.addEventListener("click", () =>
              this.goToPuzzleHistory(-1),
            );
          }

          if (nextPuzzleBtn) {
            nextPuzzleBtn.addEventListener("click", () =>
              this.goToPuzzleHistory(1),
            );
          }

          if (shareBtn) {
            shareBtn.addEventListener("click", () =>
              this.handleSharePuzzle(feedback),
            );
          }

          if (copyLinkBtn) {
            copyLinkBtn.addEventListener("click", () =>
              this.copyPuzzleLink(feedback),
            );
          }

          const wrapper = this.shadowRoot.getElementById("autocompleteWrapper");
          if (wrapper) {
            wrapper.addEventListener("focusout", () => {
              setTimeout(() => {
                if (!wrapper.contains(this.shadowRoot.activeElement)) {
                  this.clearSuggestions();
                }
              }, 150);
            });
          }
        }

        handleGuess(input, feedbackEl) {
          if (!input || this.state.gameOver) {
            return;
          }

          const guess = this.sanitizeGuess(input.value);
          input.value = guess;
          if (!guess) {
            feedbackEl.textContent = "Please enter a book name.";
            feedbackEl.className =
              "game__feedback game__feedback--show game__feedback--incorrect";

            return;
          }

          const targetDisplay =
            this.state.currentBookDisplay || this.state.currentBook;
          const isCorrect =
            this.isEquivalentBookLabel(guess, targetDisplay) ||
            this.isEquivalentBookLabel(guess, this.state.currentBook);
          const evaluation = evaluateGuess(guess, targetDisplay);

          // Store guess
          const guessRow = evaluation.map((status, i) => ({
            letter: guess[i],
            status,
          }));

          // Indicate the answer continues beyond what was typed
          if (!isCorrect && guess.length < targetDisplay.length) {
            guessRow.push({ letter: "+", status: "more" });
          }

          this.state.guesses.push(guessRow);

          this.state.attempts++;

          if (isCorrect) {
            this.state.solved = true;
            this.state.gameOver = true;

            feedbackEl.textContent = `🎉 Correct! The book is ${targetDisplay}.`;
            feedbackEl.className =
              "game__feedback game__feedback--show game__feedback--correct";
          } else if (this.state.attempts >= 6) {
            this.state.gameOver = true;

            feedbackEl.textContent = `Game Over! The answer was ${targetDisplay}.`;
            feedbackEl.className =
              "game__feedback game__feedback--show game__feedback--incorrect";
          } else {
            feedbackEl.textContent = `${6 - this.state.attempts} guesses remaining.`;
            feedbackEl.className =
              "game__feedback game__feedback--show game__feedback--incorrect";
          }

          input.value = "";

          this.state.animateLastRow = true;

          this.updateUI();
        }

        newGame() {
          this.startRandomGame();
        }

        getShareUrl() {
          return `${window.location.origin}${window.location.pathname}${window.location.search}${window.location.hash}`;
        }

        getShareData() {
          const targetDisplay =
            this.state.currentBookDisplay || this.state.currentBook;
          const gameType =
            this.state.puzzleMode === PUZZLE_MODE_DAILY ? "Daily" : "Random";
          const guessesUsed = this.state.attempts;

          return {
            title: "Bible Tools - Game",
            text: `I solved the ${gameType} Bible verse puzzle in ${guessesUsed} guess${guessesUsed === 1 ? "" : "es"}! (${targetDisplay} ${this.formatVerseReference()})`,
            url: this.getShareUrl(),
          };
        }

        canUseWebShare() {
          if (!globalThis.isSecureContext) {
            return false;
          }

          const shareFn = Reflect.get(navigator, "share");
          if (typeof shareFn !== "function") {
            return false;
          }

          const canShareFn = Reflect.get(navigator, "canShare");
          if (typeof canShareFn !== "function") {
            return true;
          }

          try {
            return canShareFn.call(navigator, { url: this.getShareUrl() });
          } catch {
            return false;
          }
        }

        async handleSharePuzzle(feedbackEl) {
          if (!this.state.solved || !this.canUseWebShare()) {
            return;
          }

          const shareFn = Reflect.get(navigator, "share");

          try {
            await shareFn.call(navigator, this.getShareData());
          } catch (error) {
            if (error?.name === "AbortError") {
              return;
            }

            const didCopy = await this.copyPuzzleLink(feedbackEl);
            if (!didCopy && feedbackEl) {
              feedbackEl.textContent =
                "Could not share this puzzle on this device.";
              feedbackEl.className =
                "game__feedback game__feedback--show game__feedback--incorrect";
            }
          }
        }

        async copyPuzzleLink(feedbackEl) {
          const shareUrl = this.getShareUrl();
          const clipboard = Reflect.get(navigator, "clipboard");
          const writeText = clipboard
            ? Reflect.get(clipboard, "writeText")
            : undefined;

          if (typeof writeText === "function") {
            try {
              await writeText.call(clipboard, shareUrl);

              if (feedbackEl) {
                feedbackEl.textContent =
                  "Puzzle link copied. Share it with a friend!";
                feedbackEl.className =
                  "game__feedback game__feedback--show game__feedback--hint";
              }

              return true;
            } catch {
              // Fall through to manual fallback prompt.
            }
          }

          const copied = globalThis.prompt(
            "Copy this puzzle link and share it:",
            shareUrl,
          );

          if (feedbackEl && copied !== null) {
            feedbackEl.textContent = "Puzzle link ready to share.";
            feedbackEl.className =
              "game__feedback game__feedback--show game__feedback--hint";
          }

          return copied !== null;
        }

        escapeHtml(text) {
          const div = document.createElement("div");
          div.textContent = text;

          return div.innerHTML;
        }

        normalizeForMatch(text) {
          return text
            .trim()
            .toLowerCase()
            .normalize("NFD")
            .replace(/\p{Diacritic}/gu, "")
            .replace(/\s+/g, " ");
        }

        getLeadingOrdinalValue(text) {
          const base = this.normalizeForMatch(text);
          if (!base) {
            return null;
          }

          const firstToken = base.split(" ")[0].replace(/[.)]/g, "");
          const numeralToDigit = {
            first: "1",
            second: "2",
            third: "3",
            "1st": "1",
            "2nd": "2",
            "3rd": "3",
            i: "1",
            ii: "2",
            iii: "3",
            ⅰ: "1",
            ⅱ: "2",
            ⅲ: "3",
            Ⅰ: "1",
            Ⅱ: "2",
            Ⅲ: "3",
            1: "1",
            2: "2",
            3: "3",
            "١": "1",
            "٢": "2",
            "٣": "3",
          };

          return numeralToDigit[firstToken] || null;
        }

        getBookSearchKeys(text) {
          const base = this.normalizeForMatch(text);
          if (!base) {
            return [];
          }

          const keys = new Set([base, base.replace(/\s+/g, "")]);
          const parts = base.split(" ");
          const rest = parts.slice(1).join(" ").trim();
          const digit = this.getLeadingOrdinalValue(base);
          if (!digit || !rest) {
            return [...keys];
          }

          const digitToRoman = {
            1: "i",
            2: "ii",
            3: "iii",
          };
          const roman = digitToRoman[digit] || digit;
          const digitVariant = `${digit} ${rest}`;
          const romanVariant = `${roman} ${rest}`;

          keys.add(digitVariant);
          keys.add(romanVariant);
          keys.add(digitVariant.replace(/\s+/g, ""));
          keys.add(romanVariant.replace(/\s+/g, ""));

          return [...keys];
        }

        getAutocompleteBookKeys(text) {
          const keys = new Set(this.getBookSearchKeys(text));
          const base = this.normalizeForMatch(text);
          if (!base) {
            return [];
          }

          const parts = base.split(" ");
          const rest = parts.slice(1).join(" ").trim();
          if (this.getLeadingOrdinalValue(base) && rest) {
            keys.add(rest);
            keys.add(rest.replace(/\s+/g, ""));
          }

          return [...keys];
        }

        isEquivalentBookLabel(left, right) {
          const leftKeys = this.getBookSearchKeys(left);
          const rightKeys = new Set(this.getBookSearchKeys(right));

          for (let i = 0; i < leftKeys.length; i++) {
            if (rightKeys.has(leftKeys[i])) {
              return true;
            }
          }

          return false;
        }

        sanitizeGuess(text) {
          return String(text || "").trim();
        }

        handleInput(input) {
          if (this.state.gameOver) {
            this.clearSuggestions();

            return;
          }

          const rawValue = input.value;
          const queryNorm = this.normalizeForMatch(rawValue);
          const queryKeys = this.getBookSearchKeys(rawValue);
          const queryOrdinal = this.getLeadingOrdinalValue(rawValue);
          const queryIsOrdinalOnly =
            Boolean(queryOrdinal) && queryNorm.split(" ").length === 1;
          if (!this.sanitizeGuess(rawValue)) {
            this.clearSuggestions();

            return;
          }

          const books =
            this.state.localizedBookNames.length > 0
              ? this.state.localizedBookNames
              : this.state.canonicalBooks;
          const canonicalAliases =
            this.state.filteredCanonicalBooks.length === books.length
              ? this.state.filteredCanonicalBooks
              : this.state.canonicalBooks;

          if (queryKeys.length === 0) {
            this.state.suggestionList = books;
            this.state.activeSuggestion = -1;
            this.renderSuggestionItems(input);

            return;
          }

          const prefix = [];
          const substring = [];

          for (let i = 0; i < books.length; i++) {
            const displayName = books[i];
            const alias = canonicalAliases[i] || "";
            const displayKeys = this.getAutocompleteBookKeys(displayName);
            const aliasKeys = this.getAutocompleteBookKeys(alias);
            const candidateKeys = [...displayKeys, ...aliasKeys];
            const displayOrdinal = this.getLeadingOrdinalValue(displayName);
            const aliasOrdinal = this.getLeadingOrdinalValue(alias);
            const ordinalOnlyMatch =
              queryIsOrdinalOnly &&
              (displayOrdinal === queryOrdinal ||
                aliasOrdinal === queryOrdinal);
            const startsWithMatch = queryIsOrdinalOnly
              ? ordinalOnlyMatch
              : queryKeys.some((queryKey) =>
                  candidateKeys.some((candidateKey) =>
                    candidateKey.startsWith(queryKey),
                  ),
                );
            const includesMatch =
              !startsWithMatch &&
              !queryIsOrdinalOnly &&
              queryKeys.some((queryKey) =>
                candidateKeys.some((candidateKey) =>
                  candidateKey.includes(queryKey),
                ),
              );

            if (startsWithMatch) {
              prefix.push(displayName);
            } else if (includesMatch) {
              substring.push(displayName);
            }
          }

          this.state.suggestionList =
            prefix.length > 0 || substring.length > 0
              ? [...prefix, ...substring]
              : books;
          this.state.activeSuggestion = -1;
          this.renderSuggestionItems(input);
        }

        renderSuggestionItems(input) {
          const list = this.shadowRoot.getElementById("suggestionsList");
          if (!list) {
            return;
          }

          if (input) {
            input.setAttribute(
              "aria-expanded",
              this.state.suggestionList.length > 0 ? "true" : "false",
            );
          }

          if (this.state.suggestionList.length === 0) {
            list.innerHTML = "";

            return;
          }

          list.innerHTML = this.state.suggestionList
            .map((book, index) => {
              const isActive = index === this.state.activeSuggestion;

              return `<li class="game__suggestion-item" role="option" id="suggestion-${index}" aria-selected="${isActive ? "true" : "false"}" data-value="${this.escapeHtml(book)}">${this.escapeHtml(book)}</li>`;
            })
            .join("");

          list.querySelectorAll(".game__suggestion-item").forEach((item) => {
            item.addEventListener("mousedown", (e) => {
              e.preventDefault();
              this.selectSuggestion(input, item.dataset.value);
            });
          });
        }

        handleInputKeydown(e, input, feedback) {
          const list = this.state.suggestionList;
          const len = list.length;

          if (e.key === "ArrowDown") {
            e.preventDefault();
            this.state.activeSuggestion =
              len === 0 ? -1 : (this.state.activeSuggestion + 1) % len;
            this.updateActiveSuggestion();
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            this.state.activeSuggestion =
              len === 0 ? -1 : (this.state.activeSuggestion - 1 + len) % len;
            this.updateActiveSuggestion();
          } else if (e.key === "Enter") {
            if (this.state.activeSuggestion >= 0 && len > 0) {
              e.preventDefault();
              this.selectSuggestion(input, list[this.state.activeSuggestion]);
            } else {
              this.clearSuggestions();
              this.handleGuess(input, feedback);
            }
          } else if (e.key === "Escape") {
            this.clearSuggestions();
          }
        }

        selectSuggestion(input, bookName) {
          input.value = bookName;
          this.clearSuggestions();
          input.focus();
        }

        clearSuggestions() {
          this.state.suggestionList = [];
          this.state.activeSuggestion = -1;
          const list = this.shadowRoot.getElementById("suggestionsList");
          const input = this.shadowRoot.getElementById("guessInput");
          if (list) {
            list.innerHTML = "";
          }

          if (input) {
            input.setAttribute("aria-expanded", "false");
            input.removeAttribute("aria-activedescendant");
          }
        }

        updateActiveSuggestion() {
          const list = this.shadowRoot.getElementById("suggestionsList");
          const input = this.shadowRoot.getElementById("guessInput");
          if (!list) {
            return;
          }

          list.querySelectorAll(".game__suggestion-item").forEach((item, i) => {
            const isActive = i === this.state.activeSuggestion;
            item.classList.toggle("game__suggestion-item--active", isActive);
            item.setAttribute("aria-selected", isActive ? "true" : "false");

            if (isActive) {
              item.scrollIntoView({ block: "nearest" });
            }
          });

          if (input) {
            if (this.state.activeSuggestion >= 0) {
              input.setAttribute(
                "aria-activedescendant",
                `suggestion-${this.state.activeSuggestion}`,
              );
            } else {
              input.removeAttribute("aria-activedescendant");
            }
          }
        }
      }

      populateTranslationSelect(resolveInitialTranslationVersion());

      customElements.define("bible-tools-game", BibleToolsGame);

      // Theme toggle
      const THEME_STORAGE_KEY = "bible-tools-game-theme";
      const SETTINGS_STORAGE_KEY = "bible-tools-game-settings-open";
      const themeToggle = document.getElementById("themeToggle");
      const settingsToggle = document.getElementById("settingsToggle");
      const settingsPanel = document.getElementById("settingsPanel");
      const titleReloadLink = document.getElementById("titleReloadLink");
      const html = document.documentElement;

      titleReloadLink?.addEventListener("click", (event) => {
        if (event.defaultPrevented || event.button !== 0) {
          return;
        }

        if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
          return;
        }

        event.preventDefault();
        const params = new URLSearchParams(window.location.search);
        params.set("mode", PUZZLE_MODE_DAILY);
        params.set("puzzle", makeDailyPuzzleId(getLocalDateKey()));

        const nextUrl = `${window.location.pathname}?${params.toString()}${window.location.hash}`;
        window.location.assign(nextUrl);
      });

      function getStoredThemePreference() {
        const storedTheme = localStorage.getItem(THEME_STORAGE_KEY);

        return storedTheme === "dark" ? "dark" : "light";
      }

      function applyTheme(theme, persist = false) {
        const isDark = theme === "dark";

        if (isDark) {
          html.setAttribute("data-theme", "dark");
          themeToggle.textContent = "☀️";
          themeToggle.setAttribute("aria-label", "Switch to light theme");
          themeToggle.setAttribute("title", "Switch to light theme");
        } else {
          html.removeAttribute("data-theme");
          themeToggle.textContent = "🌙";
          themeToggle.setAttribute("aria-label", "Switch to dark theme");
          themeToggle.setAttribute("title", "Switch to dark theme");
        }

        themeToggle.setAttribute("aria-pressed", isDark ? "true" : "false");

        if (persist) {
          localStorage.setItem(THEME_STORAGE_KEY, isDark ? "dark" : "light");
        }
      }

      applyTheme(getStoredThemePreference());

      themeToggle.addEventListener("click", () => {
        const nextTheme =
          html.getAttribute("data-theme") === "dark" ? "light" : "dark";

        applyTheme(nextTheme, true);
      });

      function getStoredSettingsVisibility() {
        return localStorage.getItem(SETTINGS_STORAGE_KEY) === "open";
      }

      function applySettingsVisibility(isOpen, persist = false) {
        if (!settingsPanel || !settingsToggle) {
          return;
        }

        settingsPanel.hidden = !isOpen;
        settingsToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        settingsToggle.setAttribute(
          "aria-label",
          isOpen ? "Hide settings panel" : "Show settings panel",
        );

        if (persist) {
          localStorage.setItem(
            SETTINGS_STORAGE_KEY,
            isOpen ? "open" : "closed",
          );
        }
      }

      applySettingsVisibility(getStoredSettingsVisibility());

      settingsToggle?.addEventListener("click", () => {
        applySettingsVisibility(settingsPanel?.hidden, true);
      });
    </script>
    <script type="module" src="service-worker/init.mjs"></script>
  </body>
</html>
